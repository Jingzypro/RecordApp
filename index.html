<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Record</title>
<meta name="theme-color" content="#1C6B57">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Record">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<style>
  :root{
    /* 纸与墨：中性纸面 + 发丝分隔 + 克制的深玉色强调 */
    --bg:#FBFAF8; --card:#FFFFFF; --card2:#F7F6F3; --ink:#17191A; --sub:#6C7176; --faint:#A5AAAE;
    --line:#E9E7E2; --line2:#F1EFEB; --sab:env(safe-area-inset-bottom); --grpbg:#EFEDE9;
    --accent:#1C6B57; --accent2:#12483A; --soft:#EAF1EE; --amber:#8A6317;
    --danger:#B4443B; --red:#C8443C; --daynum:#17191A;
    --r:14px; --r2:10px;
    --sh:0 1px 1px rgba(23,25,26,.03);
    --shx:0 2px 6px rgba(23,25,26,.05),0 16px 34px rgba(23,25,26,.07);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
  }
  /* 深色配色：跟随系统（未手动指定浅色时）*/
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){ --bg:#0B0C0C; --card:#141617; --card2:#1A1D1E; --ink:#EAECEA; --sub:#8E9498;
      --faint:#5A6165; --line:#232729; --line2:#1C1F21; --grpbg:#000000;
      --accent:#57B79B; --accent2:#7FD0B7; --soft:#152220; --amber:#C29A4A;
      --danger:#E0736A; --red:#E5544B; --daynum:#FFFFFF;
      --sh:0 1px 1px rgba(0,0,0,.4);
      --shx:0 2px 8px rgba(0,0,0,.5),0 18px 40px rgba(0,0,0,.45); }
  }
  /* 手动强制深色 */
  :root[data-theme="dark"]{ --bg:#0B0C0C; --card:#141617; --card2:#1A1D1E; --ink:#EAECEA; --sub:#8E9498;
    --faint:#5A6165; --line:#232729; --line2:#1C1F21;
    --accent:#57B79B; --accent2:#7FD0B7; --soft:#152220; --amber:#C29A4A;
    --danger:#E0736A; --red:#E5544B; --daynum:#FFFFFF;
    --sh:0 1px 1px rgba(0,0,0,.4);
    --shx:0 2px 8px rgba(0,0,0,.5),0 18px 40px rgba(0,0,0,.45); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 移动端：彻底禁止长按选中与系统菜单（与拖拽手势冲突）*/
  *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent}
  html{touch-action:manipulation;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  /* 只有真正需要输入的地方可选中 */
  input,textarea,[contenteditable="true"]{
    -webkit-user-select:text!important;user-select:text!important;-webkit-touch-callout:default}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-variant-numeric:tabular-nums;letter-spacing:-.006em}
  ::selection{background:var(--soft);color:var(--accent2)}
  body{min-height:100dvh;padding:0 14px 78px}
  .wrap{max-width:760px;margin:0 auto}
  button,input,textarea,select{font-family:var(--font);color:inherit}
  h1{font-size:25px;margin:0;letter-spacing:-.028em;font-weight:800;display:flex;align-items:baseline;min-width:0}
  .muted{color:var(--sub)}
  .card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--sh);overflow:hidden}

  /* top bar */
  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin:0 -14px 6px;padding:max(16px,env(safe-area-inset-top)) 14px 8px;
    background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid transparent}
  .top.stuck{border-bottom-color:var(--line)}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);cursor:pointer;font-size:12px;font-weight:600;
    color:var(--sub);background:var(--card);padding:6px 11px;border-radius:999px;box-shadow:none;transition:.15s}
  .pill:active{background:var(--card2)}
  .pill.ok{color:var(--accent2);background:var(--soft)}
  .pill.offline{color:var(--amber)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .pill.syncing .dot{animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}

  /* segmented */
  .seg{display:flex;gap:2px;background:var(--card2);padding:3px;border-radius:var(--r2);border:1px solid var(--line)}
  .seg button{flex:1;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--sub);
    padding:7px 10px;border-radius:9px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--soft);color:var(--accent2)}

  /* inputs */
  .inp{width:100%;border:1px solid var(--line);border-radius:var(--r2);padding:11px 13px;font-size:15px;
    background:var(--card2);outline:none;transition:border-color .15s,box-shadow .15s;letter-spacing:-.01em}
  .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}
  textarea.inp{resize:vertical;min-height:120px;line-height:1.6}
  .btn{border:1px solid transparent;border-radius:var(--r2);padding:11px 15px;font-size:14px;font-weight:650;cursor:pointer;background:var(--accent);color:#fff;letter-spacing:-.01em;transition:opacity .15s,transform .1s}
  .btn:active{transform:scale(.985);opacity:.9}
  .btn.g{background:var(--line);color:var(--sub)}
  .btn:disabled{opacity:.45}
  .row{display:flex;gap:8px;align-items:center}

  /* quick add */
  .add{display:flex;gap:8px;align-items:center;background:var(--card);border-radius:var(--r);padding:5px 5px 5px 15px;box-shadow:var(--sh);margin-bottom:12px}
  .add input{flex:1;min-width:0;border:none;background:transparent;font-size:15.5px;padding:11px 0;outline:none}
  .add input::placeholder{color:var(--faint)}
  .add button{flex:none;width:38px;height:38px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:20px;cursor:pointer}
  .add button:disabled{opacity:.35}

  /* list */
  ul.list{list-style:none;margin:0;padding:0}
  li.item{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;border-top:1px solid var(--line2)}
  ul.list>li.item:first-child{border-top:none}
  li.item:first-child{border-top:none}
  /* 勾选：空心环 → 环内实心点（与日历标记同一语言）*/
  .chk{flex:none;width:20px;height:20px;margin-top:1px;border-radius:50%;
    border:1.8px solid var(--faint);cursor:pointer;position:relative;
    transition:border-color .15s;box-sizing:border-box}
  .chk.on{border-color:var(--accent)}
  .chk.on::after{content:"";position:absolute;inset:3px;border-radius:50%;
    background:var(--accent);animation:pop .18s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  .itxt{flex:1;min-width:0;font-size:15px;line-height:1.4;word-break:break-word}
  .done .itxt{color:var(--faint);text-decoration:line-through}
  .meta{font-size:11.5px;color:var(--faint);margin-top:2px}
  .x{flex:none;border:none;background:transparent;color:var(--faint);font-size:17px;cursor:pointer;padding:0 4px;line-height:1}
  .x:hover{color:var(--danger)}

  /* week grid */
  .focus{background:var(--card);border-radius:var(--r);border:1px solid var(--line);padding:14px 15px;margin-bottom:12px}
  .focus .lbl{font-size:12px;font-weight:700;color:var(--accent2);letter-spacing:.04em;margin-bottom:6px}
  .focus textarea{width:100%;border:none;background:transparent;outline:none;resize:none;font-size:14.5px;line-height:1.55;min-height:44px;color:var(--ink)}
  .focus textarea::placeholder{color:var(--faint)}

  .grid{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:1px;background:var(--line);
    border-radius:var(--r);overflow:hidden;border:1px solid var(--line);
    height:calc(100dvh - var(--topH,84px) - 246px);min-height:390px}
  .cell{background:var(--card);min-height:0;padding:9px 9px 11px;display:flex;flex-direction:column;overflow:hidden}
  .cell.today{background:var(--card2);box-shadow:inset 2px 0 0 var(--accent)}
  .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .cd{font-size:13.5px;font-weight:700;display:flex;align-items:baseline;gap:5px}
  .cd small{font-weight:500;color:var(--sub);font-size:12px}
  .cadd{border:none;background:transparent;color:var(--faint);font-size:17px;cursor:pointer;line-height:1;padding:0 2px}
  .cadd:hover{color:var(--accent)}
  .citems{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;scrollbar-width:none}
  .citems::-webkit-scrollbar{display:none}
  /* 内容超出时给个渐隐提示，暗示还能往下滑 */
  .cell{position:relative}
  .cell::after{content:"";position:absolute;left:0;right:0;bottom:0;height:14px;pointer-events:none;
    background:linear-gradient(transparent,var(--card));opacity:0;transition:opacity .2s}
  .cell.more::after{opacity:1}
  .ci{display:flex;gap:7px;align-items:center;font-size:12.5px;line-height:1.35;padding:2px 0;cursor:pointer}
  .ci.dn{color:var(--faint);text-decoration:line-through}
  .ci .tm{color:var(--sub);font-variant-numeric:tabular-nums;flex:none}
  /* 可拖元素：浏览器不得从这里发起滚动，手势完全交给脚本 */
  [data-drag]{touch-action:none!important}
  /* 可拖拽条目：强制不可选中，长按只触发拖拽 */
  [data-drag],[data-dv],[data-drop],[data-hl],.tlcol,.dcell,.cell,.evb,.qsr,.hchip{
    -webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important}
  .ev.dragging{opacity:.35}
  .dcell.over{background:var(--soft);box-shadow:inset 0 0 0 2px var(--accent)}
  .ci.dragging{opacity:.35}
  .cell.over{background:var(--soft);box-shadow:inset 0 0 0 2px var(--accent)}
  .ghost{position:fixed;z-index:200;pointer-events:none;left:0;top:0;
    background:var(--card);border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:600;
    box-shadow:var(--shx);max-width:60vw;overflow:hidden;white-space:nowrap;
    text-overflow:ellipsis;transform-origin:center;opacity:.96}

  /* month */

  /* 计划页层级导航标题 */
  .ptitle{border:none;background:transparent;padding:0;cursor:pointer;display:flex;align-items:center;gap:7px;
    font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .bdg{font-size:12px;font-weight:700;color:var(--sub);background:var(--card);padding:3px 8px;border-radius:8px;box-shadow:var(--sh)}
  .ybtn{border:none;background:var(--card);box-shadow:var(--sh);border-radius:999px;padding:7px 15px 7px 11px;
    font-size:17px;font-weight:700;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:5px}
  .todaybtn{position:fixed;border:1px solid var(--line);left:16px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:25;
    border-radius:999px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-.01em;
    background:color-mix(in srgb,var(--card) 88%,transparent);backdrop-filter:blur(14px);
    box-shadow:var(--shx);color:var(--ink)}

  /* month —— Apple 日历式：连续滚动 + 彩色事件条 */
  .mscroll{margin:0 -4px}
  .mtitle{display:grid;grid-template-columns:26px repeat(7,1fr);padding:22px 0 6px}
  .mtitle span{font-size:30px;font-weight:800;letter-spacing:-.025em;padding-left:2px;white-space:nowrap}
  .wkhead{position:sticky;top:var(--topH,84px);z-index:4;display:grid;grid-template-columns:26px repeat(7,1fr);
    background:var(--bg);border-bottom:1px solid var(--line);padding:6px 0 6px}
  .wkhead div{text-align:center;font-size:11.5px;font-weight:700;color:var(--faint)}
  .wrow{display:grid;grid-template-columns:26px repeat(7,1fr);min-height:40vh}
  .wknum{display:flex;justify-content:center;padding-top:9px;cursor:pointer;
    font-size:10.5px;font-weight:700;color:var(--faint);font-variant-numeric:tabular-nums;
    border-top:1px solid transparent}
  .wknum:active{color:var(--accent)}
  .dcell{padding:5px 2px 6px;overflow:hidden;cursor:pointer;border-top:1px solid var(--line)}
  .dcell.pad{border-top:none;cursor:default}
  .dnum{font-size:19px;font-weight:700;width:32px;height:32px;display:grid;place-items:center;margin:0 auto 5px;font-variant-numeric:tabular-nums}
  .dcell.today .dnum{background:var(--ink);color:var(--bg);border-radius:50%}
  .ev{display:block;font-size:10.5px;line-height:1.28;padding:3px 4px;border-radius:5px;margin:0 1px 2px;
    overflow:hidden;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .ev .evt{display:block;font-size:9.5px;opacity:.75;font-weight:600}
  .ev.dn{opacity:.45;text-decoration:line-through}
  .evmore{font-size:9.5px;color:var(--faint);padding-left:4px;font-weight:600}
  .c0{background:rgba(239,68,68,.17);color:#EF4444}
  .c1{background:rgba(245,158,11,.17);color:#D97706}
  .c2{background:rgba(16,185,129,.17);color:#059669}
  .c3{background:rgba(59,130,246,.17);color:#3B82F6}
  .c4{background:rgba(139,92,246,.17);color:#8B5CF6}
  .c5{background:rgba(236,72,153,.17);color:#EC4899}
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]) .c1{color:#F59E0B}
    :root:not([data-theme="light"]) .c2{color:#10B981}
  }
  :root[data-theme="dark"] .c1{color:#F59E0B}
  :root[data-theme="dark"] .c2{color:#10B981}
  .swatch{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer}
  .swatch.on{border-color:var(--ink)}

  /* year —— 一屏一年，12 个月完整展示 */
  .ysec{min-height:calc(100dvh - 118px);display:flex;flex-direction:column;padding-bottom:10px}
  .yhead{font-size:clamp(24px,4.2vh,36px);font-weight:800;letter-spacing:-.025em;
    padding:.6vh 24px 1.1vh;border-bottom:1px solid var(--line);margin-bottom:1.6vh;flex:none}
  .ygrid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:1.9vh 14px;padding:0 24px;align-content:start}
  .ymini{cursor:pointer}
  .ymini .mn2{font-size:clamp(13px,4.0vh,21px);font-weight:700;margin-bottom:.55vh;letter-spacing:-.01em}
  .ymini.cur .mn2{color:var(--red)}
  .mdays{display:grid;grid-template-columns:repeat(7,1fr);gap:.15vh 0}
  .mdays span{position:relative;z-index:0;height:2.05vh;min-height:13px;display:grid;place-items:center;
    font-size:clamp(8px,1.18vh,12px);line-height:1;font-weight:600;color:var(--daynum);
    font-variant-numeric:tabular-nums}
  .mdays span.e{color:transparent}
  .mdays span.has{font-weight:800}
  .mdays span.td{color:#fff;font-weight:800}
  .mdays span.td::before{content:"";position:absolute;left:50%;top:50%;z-index:-1;
    width:2.05vh;height:2.05vh;min-width:15px;min-height:15px;
    transform:translate(-50%,-50%);border-radius:50%;background:var(--red)}

  .dslide{will-change:transform}
  .dslide.snap{transition:transform .26s cubic-bezier(.32,.72,0,1)}

  /* 日视图：拖拽新建时段 */
  .evb.prev{background:color-mix(in srgb,var(--accent) 16%,var(--card));
    border:1px solid var(--accent);border-left:3px solid var(--accent);color:var(--accent2);
    z-index:4;pointer-events:none;display:flex;flex-direction:column;justify-content:center}
  .evb.prev b{font-size:11.5px}

  /* 周视图：整屏固定，不产生页面滚动 */
  .wkfit{display:flex;flex-direction:column;min-height:0;
    height:calc(100dvh - var(--topH,84px) - 104px)}
  .wkfit .focus{flex:none}
  .wkfit .grid{flex:1;min-height:0;height:auto}
  body.lockv{overflow:hidden;overscroll-behavior:none}

  /* 拖拽删除区 */
  .dz{position:fixed;left:0;right:0;bottom:0;z-index:100;
    height:calc(84px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
    display:none;align-items:center;justify-content:center;gap:9px;
    font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--danger);
    background:color-mix(in srgb,var(--danger) 9%,var(--bg));
    border-top:1px solid color-mix(in srgb,var(--danger) 35%,var(--line));
    transition:background .15s,color .15s}
  .dz.on{display:flex}
  .dz.hot{background:var(--danger);color:#fff;border-top-color:var(--danger)}
  .dz .zi{font-size:17px}

  .star{flex:none;border:none;background:transparent;cursor:pointer;font-size:17px;line-height:1;
    color:var(--faint);padding:2px 4px 2px 0;font-family:inherit;transition:color .15s}
  .star.on{color:var(--amber)}
  .cdstrip{display:flex;gap:8px;overflow-x:auto;padding:1px 0 2px}
  .cdcard{flex:none;min-width:118px;border:1px solid var(--line);background:var(--card);border-radius:13px;
    padding:12px 13px;cursor:pointer}
  .cdcard .n{font-size:12.5px;font-weight:650;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:132px}
  .cdcard .v{font-size:23px;font-weight:800;letter-spacing:-.035em;font-variant-numeric:tabular-nums;
    line-height:1.1;margin-top:5px}
  .cdcard .u{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:2px}

  .dwi .ic{width:22px;flex:none;display:grid;place-items:center;color:var(--sub)}
  .dwi.on .ic{color:var(--accent)}
  .dwi svg{display:block}

  /* 待办标记：未完成=空心环，完成=环内实心点（中间留缝）*/
  .mk{flex:none;width:15px;height:15px;border-radius:50%;position:relative;
    border:1.7px solid currentColor;box-sizing:border-box}
  .mk.on::after{content:"";position:absolute;inset:2.4px;border-radius:50%;background:currentColor}
  .mk.sm{width:13px;height:13px;border-width:1.6px}
  .mk.sm.on::after{inset:2px}

  /* 首页 · 主视觉 */
  .hero{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px 17px 15px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
  .hero .hl{flex:1;min-width:0}
  .hgreet{font-size:11px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--faint)}
  .hdate{font-size:26px;font-weight:800;letter-spacing:-.032em;margin-top:3px;line-height:1.1}
  .hsub{font-size:12.5px;color:var(--sub);font-weight:600;margin-top:5px;letter-spacing:-.01em}
  .ring{flex:none;width:62px;height:62px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .rt{position:absolute;inset:0;display:grid;place-items:center;
    font-size:15px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}

  /* 首页 · 快捷动作 */
  .qact{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .qa{border:1px solid var(--line);background:var(--card);border-radius:13px;cursor:pointer;
    padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;
    font-family:inherit;color:var(--ink);transition:transform .12s,background .15s}
  .qa:active{transform:scale(.95);background:var(--card2)}
  .qa .i{font-size:18px;line-height:1}
  .qa .n{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--sub)}

  /* 首页 · 今日时间线 */
  .agenda{position:relative;padding-left:2px}
  .ag{display:flex;gap:12px;padding:9px 0;cursor:pointer;position:relative}
  .ag .tm{flex:none;width:44px;font-size:12px;font-weight:700;color:var(--sub);
    font-variant-numeric:tabular-nums;padding-top:1px}
  .ag .bar{flex:none;width:3px;border-radius:2px;background:var(--accent);opacity:.85}
  .ag .tx{flex:1;min-width:0;font-size:14px;font-weight:620;letter-spacing:-.012em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-top:0}
  .ag .tx small{display:block;font-size:11.5px;color:var(--faint);font-weight:600;margin-top:2px}
  .ag.past{opacity:.42}
  .ag.done .tx{text-decoration:line-through;color:var(--faint)}
  .agnow{display:flex;align-items:center;gap:8px;padding:2px 0 2px 56px;margin:1px 0}
  .agnow i{flex:1;height:1.5px;background:var(--red);border-radius:2px}
  .agnow b{font-size:10px;font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;letter-spacing:.02em}

  /* 首页 · 指标 */
  .mets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:2px}
  .met{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:12px 12px 11px;cursor:pointer}
  .met .v{font-size:19px;font-weight:780;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1.15}
  .met .k{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:4px}

  /* 首页布局 */
  .brief{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;
    display:flex;flex-direction:column;gap:11px;min-width:0;margin-bottom:12px}
  .dadd{border:none;background:transparent;color:var(--faint);font-size:19px;font-weight:400;
    line-height:1;cursor:pointer;padding:0 1px;font-family:inherit;transition:color .15s}
  .dadd:active{color:var(--accent)}
  .bline{display:flex;align-items:baseline;gap:9px;min-width:0}
  .bt{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);
    flex:none;width:46px}
  .bv{font-size:13.5px;font-weight:620;letter-spacing:-.012em;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bv.dim{color:var(--faint);font-weight:550}
  .bv .n{font-variant-numeric:tabular-nums;font-weight:750}
  .bdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:none;margin-right:1px}
  .qcol{display:flex;flex-direction:column;gap:10px}
  .qbtn{flex:1;border:1px solid var(--line);background:var(--card);border-radius:var(--r);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    font-family:inherit;color:var(--ink);padding:10px 4px;transition:transform .12s,background .15s}
  .qbtn:active{transform:scale(.96);background:var(--card2)}
  .qbtn .qi{font-size:19px;line-height:1}
  .qbtn .ql{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2px}
  .duo .card{display:flex;flex-direction:column;min-height:132px}
  .dhd{display:flex;align-items:baseline;justify-content:space-between;padding:11px 12px 7px}
  .dhd .t{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--faint)}
  .dhd .n{font-size:13px;font-weight:750;font-variant-numeric:tabular-nums}
  .dbody{flex:1;padding:0 12px 11px;overflow:hidden}
  .mini{display:flex;align-items:center;gap:7px;font-size:12.5px;line-height:1.45;
    padding:3px 0;font-weight:600;letter-spacing:-.01em}
  .mini i{width:5px;height:5px;border-radius:50%;background:var(--faint);flex:none;font-style:normal}
  .mini.ok{color:var(--faint)} .mini.ok i{background:var(--accent)}
  .mini span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dnone{font-size:12.5px;color:var(--faint);padding:6px 0}
  .hstrip{display:flex;gap:7px;overflow-x:auto;padding:2px 0 1px}
  .hchip{flex:none;display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:7px 13px 7px 10px;cursor:pointer;font-size:13px;font-weight:620;
    letter-spacing:-.01em;transition:.15s}
  .hchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .hchip .e{font-size:14px}

  /* 天气 */
  .wx{display:inline-flex;align-items:baseline;gap:5px;border:none;background:transparent;cursor:pointer;
    padding:0 0 0 10px;margin-left:2px;font-family:inherit;color:var(--sub);
    font-size:14px;font-weight:650;letter-spacing:-.02em;line-height:1;
    border-left:1px solid var(--line);transition:opacity .15s}
  .wx:active{opacity:.55}
  .wx .g{font-size:14px;line-height:1}
  .wx .t{font-variant-numeric:tabular-nums}
  .wx .t sup{font-size:9px;font-weight:600;vertical-align:top;opacity:.6;margin-left:1px}
  .wx.load{opacity:.4}

  /* 表单弹层：紧凑对齐的行式布局 */
  .fsheet{max-width:100%;overflow-x:hidden}
  .fhd{font-size:20px;font-weight:800;letter-spacing:-.03em;margin:0 0 3px}
  .fsub{font-size:12.5px;color:var(--faint);font-weight:600;margin-bottom:16px}
  .ftitle{width:100%;box-sizing:border-box;border:none;background:transparent;
    font-size:19px;font-weight:700;letter-spacing:-.02em;color:var(--ink);font-family:inherit;
    padding:2px 0 12px;outline:none;border-bottom:1px solid var(--line);margin-bottom:4px}
  .ftitle::placeholder{color:var(--faint);font-weight:600}
  .frow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .frow .fk{font-size:14px;font-weight:650;color:var(--sub);flex:none;min-width:56px;letter-spacing:-.01em}
  .frow .fv{flex:1;display:flex;justify-content:flex-end;align-items:center;gap:8px;min-width:0}
  /* 原生日期/时间控件：去掉系统外观，右对齐，16px 防止 iOS 自动放大 */
  .fdt{-webkit-appearance:none;appearance:none;font-family:inherit;font-size:16px;font-weight:700;
    color:var(--ink);letter-spacing:-.02em;text-align:center;outline:none;
    background:var(--card2);border:1px solid var(--line);border-radius:10px;
    padding:8px 11px;font-variant-numeric:tabular-nums;min-width:0;
    transition:border-color .15s,background .15s}
  .fdt:focus{border-color:var(--accent);background:var(--soft)}
  .fdt:active{background:var(--soft)}
  .fdt::-webkit-date-and-time-value{text-align:right}
  .fdash{color:var(--faint);font-size:13px;flex:none}
  /* 重复：改用自动换行的胶囊，取代系统 select */
  .fpills{display:flex;flex-wrap:wrap;gap:6px;padding:12px 0 2px}
  .fpills button{border:1px solid var(--line);background:transparent;color:var(--sub);
    border-radius:999px;padding:7px 13px;font-size:13px;font-weight:650;cursor:pointer;
    font-family:inherit;letter-spacing:-.01em;transition:.15s;white-space:nowrap}
  .fpills button.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
  .fsw{display:flex;gap:10px;flex-wrap:wrap;padding:12px 2px 4px;max-width:100%}
  .fsw button{width:30px;height:30px;flex:none;border-radius:50%;border:none;cursor:pointer;
    padding:0;position:relative;transition:box-shadow .15s}
  /* 选中：用内描边表示，不向外扩，避免把整排挤出容器 */
  .fsw button.on{box-shadow:inset 0 0 0 3px var(--card),inset 0 0 0 5px currentColor}
  .fsw button.none{background:var(--card2);box-shadow:inset 0 0 0 1.5px var(--line)}
  .fsw button.none.on{box-shadow:inset 0 0 0 2px var(--ink)}
  .fsw button.none::after{content:"";position:absolute;left:50%;top:4px;bottom:4px;width:1.5px;
    background:var(--line);transform:rotate(45deg);transform-origin:center}
  .fbtns{display:flex;gap:9px;margin-top:20px}
  .fbtns .btn{flex:1}

  /* 表单：分组卡片（对齐系统日历的层次与排版） */
  .agrp{background:var(--card);border-radius:16px;margin-bottom:18px;overflow:hidden}
  .arow{display:flex;align-items:center;gap:12px;padding:0 16px;min-height:52px;position:relative}
  .arow+.arow::before{content:"";position:absolute;left:16px;right:0;top:0;height:.5px;background:var(--line)}
  .arow .ak{font-size:17px;font-weight:400;letter-spacing:-.022em;flex:none;color:var(--ink)}
  .arow .av{margin-left:auto;display:flex;align-items:center;gap:8px;min-width:0;
    font-size:17px;color:var(--sub);font-weight:400}
  .ain{width:100%;border:none;background:transparent;font-family:inherit;font-size:17px;
    font-weight:400;color:var(--ink);outline:none;padding:15px 0;letter-spacing:-.022em}
  .ain::placeholder{color:var(--faint)}
  /* 日期 / 时间胶囊 */
  .achip{-webkit-appearance:none;appearance:none;font-family:inherit;font-size:16px;font-weight:500;
    color:var(--ink);background:var(--card2);border:none;border-radius:10px;padding:8px 11px;
    outline:none;font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-align:center;
    transition:background .15s,color .15s;min-width:0}
  .achip:focus{background:var(--accent);color:#fff}
  .achip:disabled{opacity:.32}
  /* iOS 开关 */
  .atog{width:51px;height:31px;border-radius:999px;background:var(--line2);border:1px solid var(--line);
    cursor:pointer;position:relative;transition:background .22s,border-color .22s;flex:none;padding:0}
  .atog::after{content:"";position:absolute;top:1.5px;left:1.5px;width:26px;height:26px;border-radius:50%;
    background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.22);transition:transform .22s}
  .atog.on{background:var(--accent);border-color:var(--accent)}
  .atog.on::after{transform:translateX(20px)}
  /* 选项胶囊（取代系统滚轮选择器） */
  .aopts{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 15px;margin-top:-2px}
  .aopts button{border:none;background:var(--card2);color:var(--sub);border-radius:999px;
    padding:8px 14px;font-size:14.5px;font-weight:500;cursor:pointer;font-family:inherit;
    letter-spacing:-.015em;transition:.15s;white-space:nowrap}
  .aopts button.on{background:var(--accent);color:#fff;font-weight:600}
  .anote{width:100%;border:none;background:transparent;font-family:inherit;font-size:17px;
    font-weight:400;color:var(--ink);outline:none;resize:none;padding:15px 0;min-height:84px;
    line-height:1.45;letter-spacing:-.022em}
  .anote::placeholder{color:var(--faint)}
  /* 顶部操作条 */
  .ahd{display:flex;align-items:center;padding:2px 0 16px}
  .ahd .t{flex:1;text-align:center;font-size:17px;font-weight:700;letter-spacing:-.022em}
  .acir{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;flex:none;
    display:grid;place-items:center;font-family:inherit;font-size:15px;line-height:1;
    background:var(--card);color:var(--sub);transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .acir.ok{background:var(--accent);color:#fff}
  .acir:active{transform:scale(.92)}
  /* 顶部分段：Event / To-do */
  .aseg{display:flex;background:var(--card2);border-radius:11px;padding:2.5px;margin-bottom:20px}
  .aseg button{flex:1;border:none;background:transparent;border-radius:9px;padding:8px 0;
    font-family:inherit;font-size:14.5px;font-weight:600;color:var(--sub);cursor:pointer;
    letter-spacing:-.015em;transition:.18s}
  .aseg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  /* 快速捕捉 */
  .fab{position:fixed;right:16px;bottom:calc(88px + env(safe-area-inset-bottom));z-index:28;
    width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;background:var(--ink);color:var(--bg);
    font-size:26px;font-weight:300;line-height:1;box-shadow:var(--shx);display:grid;place-items:center;
    transition:transform .14s cubic-bezier(.32,.72,0,1)}
  .fab:active{transform:scale(.93)}
  .capwrap{position:fixed;inset:0;z-index:130;display:none;align-items:flex-start;justify-content:center;
    background:color-mix(in srgb,var(--ink) 22%,transparent);backdrop-filter:blur(3px);padding:0 14px}
  .capwrap.on{display:flex}
  .cap{width:100%;max-width:520px;margin-top:min(18vh,120px);background:var(--card);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shx);overflow:hidden}
  .cap input{width:100%;border:none;outline:none;background:transparent;color:var(--ink);
    font-size:17px;font-weight:600;letter-spacing:-.015em;padding:17px 18px}
  .cappv{border-top:1px solid var(--line2);padding:11px 18px 13px;font-size:12.5px;color:var(--sub);
    display:flex;align-items:center;gap:9px;min-height:44px}
  .capk{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    padding:3px 7px;border-radius:5px;background:var(--soft);color:var(--accent2);flex:none}
  .capk.cost{background:color-mix(in srgb,var(--amber) 16%,transparent);color:var(--amber)}
  .capdim{color:var(--faint)}

  /* 快速安排 Quick Schedule */
  .qswrap{position:fixed;inset:0;z-index:126;display:none;background:var(--bg);flex-direction:column;
    padding-top:max(14px,env(safe-area-inset-top))}
  .qswrap.on{display:flex}
  .qshd{display:flex;align-items:center;gap:10px;padding:2px 14px 10px}
  .qshd h3{flex:1;text-align:center;margin:0;font-size:19px;font-weight:800;letter-spacing:-.025em}
  .qstab{display:flex;border-bottom:1px solid var(--line)}
  .qstab button{flex:1;border:none;background:transparent;cursor:pointer;font-family:inherit;
    padding:11px 0 10px;font-size:15px;font-weight:700;color:var(--faint);letter-spacing:-.01em;
    border-bottom:2px solid transparent;margin-bottom:-1px}
  .qstab button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .qsbody{flex:1;display:grid;grid-template-columns:92px 1fr;min-height:0}
  .qsrail{border-right:1px solid var(--line);overflow-y:auto;padding:12px 8px calc(20px + env(safe-area-inset-bottom))}
  .qsd{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;border-radius:12px;
    cursor:pointer;margin-bottom:4px}
  .qsd .l{font-size:12.5px;font-weight:700;color:var(--sub);letter-spacing:-.01em;text-align:center;line-height:1.2}
  .qsd .c{font-size:11.5px;font-weight:700;min-width:22px;height:22px;display:grid;place-items:center;
    border-radius:7px;background:var(--card2);color:var(--sub);font-variant-numeric:tabular-nums}
  .qsd.on{background:var(--ink)}
  .qsd.on .l{color:var(--bg)} .qsd.on .c{background:var(--bg);color:var(--ink)}
  .qsd.td .l{color:var(--red)}
  .qsnav{display:flex;justify-content:center;gap:14px;padding:6px 0 2px}
  .qsnav button{border:none;background:transparent;color:var(--faint);font-size:15px;cursor:pointer;padding:6px 10px}
  .qslist{overflow-y:auto;padding:12px 14px calc(20px + env(safe-area-inset-bottom))}
  .qsg{font-size:10.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);
    margin:14px 2px 8px}
  .qsr{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 8px 12px 14px;margin-bottom:8px}
  .qsr .t{flex:1;min-width:0;font-size:14.5px;font-weight:620;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .qsr .t small{display:block;font-size:11.5px;color:var(--faint);font-weight:600;margin-top:2px}
  .qsr .a{flex:none;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
    background:var(--card2);color:var(--sub);font-size:19px;line-height:1;display:grid;place-items:center;
    font-family:inherit;transition:.15s}
  .qsr .a:active{background:var(--accent);color:#fff;transform:scale(.92)}

  .qsadd{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .qsadd input{flex:1;border:1px solid var(--line);background:var(--card2);border-radius:11px;
    padding:11px 13px;font-size:15px;font-weight:600;outline:none;color:var(--ink);
    letter-spacing:-.01em;font-family:inherit}
  .qsadd input:focus{border-color:var(--accent)}
  .qsadd button{flex:none;width:38px;height:38px;border-radius:11px;border:none;cursor:pointer;
    background:var(--accent);color:#fff;font-size:20px;line-height:1;font-family:inherit}
  .qsadd button:disabled{background:var(--card2);color:var(--faint)}

  /* 全局搜索 */
  .srwrap{position:fixed;inset:0;z-index:125;display:none;background:var(--bg);
    flex-direction:column;padding:max(14px,env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))}
  .srwrap.on{display:flex}
  .srtop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .srtop input{flex:1;border:1px solid var(--line);background:var(--card2);border-radius:var(--r2);
    padding:11px 13px;font-size:16px;font-weight:600;outline:none;color:var(--ink);letter-spacing:-.01em}
  .srtop input:focus{border-color:var(--accent)}
  .srres{flex:1;overflow-y:auto;max-width:760px;width:100%;margin:0 auto}
  .srrow{display:flex;align-items:baseline;gap:10px;padding:12px 13px;border-top:1px solid var(--line2);cursor:pointer}
  .srrow:first-child{border-top:none}
  .srrow:active{background:var(--card2)}
  .srtag{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);flex:none;width:52px}
  .srtx{flex:1;min-width:0;font-size:14.5px;font-weight:600;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srtx mark{background:color-mix(in srgb,var(--accent) 22%,transparent);color:inherit;border-radius:3px;padding:0 1px}
  .srmt{font-size:11.5px;color:var(--faint);flex:none}

  /* 热力图 & 周回顾 */
  .heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:3px;overflow-x:auto;padding:2px 0}
  .heat i{width:10px;height:10px;border-radius:2.5px;background:var(--line2);display:block}
  .heat i.l1{background:color-mix(in srgb,var(--accent) 28%,var(--card))}
  .heat i.l2{background:color-mix(in srgb,var(--accent) 55%,var(--card))}
  .heat i.l3{background:color-mix(in srgb,var(--accent) 78%,var(--card))}
  .heat i.l4{background:var(--accent)}
  .heatlg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--faint);margin-top:8px;justify-content:flex-end}
  .heatlg i{width:9px;height:9px;border-radius:2.5px;display:block}
  .rvhero{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
  .rvc{background:var(--card);padding:15px 15px 14px}
  .rvn{font-size:27px;font-weight:750;letter-spacing:-.035em;line-height:1.1}
  .rvl{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);margin-top:5px}
  .rvd{font-size:11.5px;font-weight:650;margin-top:3px}
  .rvd.up{color:var(--danger)} .rvd.down{color:var(--accent)}

  /* 撤销提示条 */
  .toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));z-index:120;
    transform:translate(-50%,14px);opacity:0;pointer-events:none;transition:.22s cubic-bezier(.32,.72,0,1);
    display:flex;align-items:center;gap:14px;background:var(--ink);color:var(--bg);
    padding:11px 14px 11px 16px;border-radius:999px;box-shadow:var(--shx);font-size:13.5px;font-weight:600;
    max-width:calc(100vw - 32px)}
  .toast.on{opacity:1;transform:translate(-50%,0);pointer-events:auto}
  .toast b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toast button{border:none;background:transparent;color:var(--accent2);font-weight:750;font-size:13.5px;
    cursor:pointer;padding:2px 2px;letter-spacing:-.01em;flex:none}
  @media (prefers-color-scheme: dark){:root:not([data-theme="light"]) .toast button{color:var(--accent)}}
  :root[data-theme="dark"] .toast button{color:var(--accent)}

  /* 左侧抽屉菜单 */
  .scrim{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;
    transition:opacity .22s ease;backdrop-filter:blur(2px)}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:min(292px,82vw);z-index:91;background:var(--card);
    border-right:1px solid var(--line);box-shadow:var(--shx);transform:translateX(-102%);transition:transform .24s cubic-bezier(.32,.72,0,1);
    display:flex;flex-direction:column;padding:max(20px,env(safe-area-inset-top)) 0 calc(16px + env(safe-area-inset-bottom))}
  .drawer.on{transform:none}
  .dwtitle{font-size:21px;font-weight:800;letter-spacing:-.03em;padding:6px 22px 16px}
  .dwlist{flex:1;overflow-y:auto;padding:0 10px}

  .dhead{position:sticky;top:calc(var(--topH,84px) + 66px);z-index:5;display:grid;

  .kv{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;border-top:1px solid var(--line2);gap:10px}
  .card>.kv:first-child{border-top:none}

  .badge.warn{background:#FBF3E4;color:var(--amber)}

    color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px}
  .total span:last-child{font-size:19px;font-weight:750;color:var(--ink);letter-spacing:-.02em}

  .sec{font-size:10.5px;font-weight:700;color:var(--faint);letter-spacing:.11em;text-transform:uppercase;margin:22px 3px 9px}
  .empty{text-align:center;padding:40px 16px;color:var(--faint);font-size:13.5px;letter-spacing:-.005em}
  .empty .e{font-size:32px;display:block;margin-bottom:8px}

  /* tabbar */
  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--line);
    padding:9px 4px 17px;z-index:30;
    }
  .tabs button{flex:1;border:none;background:transparent;cursor:pointer;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--faint);font-size:10.5px;font-weight:600}
  .tabs button.on{color:var(--ink);font-weight:700}
  .tabs button.on span{transform:translateY(-1px)}
  .tabs button span{transition:transform .18s cubic-bezier(.32,.72,0,1)}
  .tabs svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

  /* sheet */
  .ov{position:fixed;inset:0;background:rgba(8,20,15,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:60}
  .ov.show{display:flex}

    border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));

    animation:up .26s cubic-bezier(.2,.85,.25,1)}
  .sheet *{max-width:100%;box-sizing:border-box}
  /* iOS：输入字号 <16px 会触发页面自动放大，统一到 16px */
  .sheet input,.sheet textarea,.sheet select{font-size:16px}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  @media(min-width:600px){.ov{align-items:center}.sheet{border-radius:18px}}
  .sheet h2{margin:0 0 12px;font-size:18px}
  .fl{display:block;font-size:12.5px;font-weight:700;margin:10px 0 5px;color:var(--sub)}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
/* iOS 独立模式冷启动时 safe-area 首帧报 0（约 60ms 后才给真值），
   会让底栏高度突变。这里先套用上次缓存的真值，消除跳动。 */
(function(){try{
  var v=localStorage.getItem("rec.sab");
  if(v&&+v>0&&+v<80){document.documentElement.style.setProperty("--sab",v+"px");return;}
  // 没有缓存时：屏幕高 >800 的机型基本都有底部横杠，先按 34 预留，拿到真值再覆盖
  if(window.innerHeight>800)document.documentElement.style.setProperty("--sab","34px");
}catch(e){}})();
function keepSab(){
  var p=document.getElementById("safeProbe"); if(!p)return;
  var h=p.offsetHeight;
  if(h>0&&h<80){
    document.documentElement.style.setProperty("--sab",h+"px");
    try{localStorage.setItem("rec.sab",String(h))}catch(e){}}}
["load","pageshow","orientationchange"].forEach(function(e){
  window.addEventListener(e,function(){
    keepSab();
    [60,200,600,1200].forEach(function(t){setTimeout(keepSab,t)});});});
document.addEventListener("visibilitychange",function(){if(!document.hidden)keepSab()});

(function(){
"use strict";
/* ============ 存储 ============ */
var store=(function(){try{localStorage.setItem("__t","1");localStorage.removeItem("__t");
  return{get:function(k){return localStorage.getItem(k)},set:function(k,v){localStorage.setItem(k,v)},del:function(k){localStorage.removeItem(k)}};
}catch(e){var m={};return{get:function(k){return k in m?m[k]:null},set:function(k,v){m[k]=v},del:function(k){delete m[k]}};}})();
var LS={data:"rec.data.v2",out:"rec.out.v2",cfg:"todo.cloud.v1",theme:"rec.theme"};

/* ---- 外观：system / light / dark ---- */
var theme=(function(){try{return store.get(LS.theme)||"system"}catch(e){return "system"}})();

/* ---- 天气：Open-Meteo（免密钥），点击跳系统天气 App ---- */
var wx=null, wxUnit="c", wxBusy=false;
try{ wx=JSON.parse(store.get("rec.wx")||"null"); }catch(e){}
try{ wxUnit=store.get("rec.wxunit")||"c"; }catch(e){}

var WXG={0:"☀️",1:"🌤",2:"⛅️",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌦",
  56:"🌧",57:"🌧",61:"🌧",63:"🌧",65:"🌧",66:"🌧",67:"🌧",71:"🌨",73:"🌨",75:"🌨",
  77:"🌨",80:"🌦",81:"🌧",82:"🌧",85:"🌨",86:"🌨",95:"⛈",96:"⛈",99:"⛈"};
function wxGlyph(code,day){
  if(code===0)return day?"☀️":"🌙";
  if((code===1||code===2)&&!day)return "☁️";
  return WXG[code]||"☁️";}

function wxChip(){
  if(!wx||wx.t==null)
    return '<button class="wx load" id="wxBtn"><span class="g">'+(wxBusy?"◌":"☁")+'</span>'+
           '<span class="t" style="font-size:12px">'+(wxBusy?"…":"Weather")+'</span></button>';
  var t=wxUnit==="f"?Math.round(wx.t*9/5+32):Math.round(wx.t);
  return '<button class="wx" id="wxBtn" title="'+esc(wx.place||"")+'">'+
    '<span class="g">'+wxGlyph(wx.code,wx.day!==0)+'</span>'+
    '<span class="t">'+t+'°<sup>'+wxUnit.toUpperCase()+'</sup></span></button>';}

function wxSave(){try{store.set("rec.wx",JSON.stringify(wx))}catch(e){}}

function wxFetchAt(la,lo,place){
  return fetch("https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+
    "&current=temperature_2m,weather_code,is_day&timezone=auto")
  .then(function(r){return r.json()})
  .then(function(j){
    var c=j&&j.current; if(!c)throw new Error("no data");
    wx=Object.assign({},wx||{},{t:c.temperature_2m,code:c.weather_code,day:c.is_day,
      lat:la,lon:lo,place:place||(wx&&wx.place)||"",at:Date.now(),denied:false});
    wxSave();return true;});}

function wxLoad(force){
  if(wxBusy)return;
  if(wx&&wx.denied&&!force)return;
  var fresh = wx && wx.at && (Date.now()-wx.at < 30*60*1000);
  if(fresh&&!force)return;
  // 手动指定过城市 → 直接用坐标，不再请求定位
  if(wx&&wx.manual&&wx.lat){
    wxBusy=true;
    wxFetchAt(wx.lat,wx.lon,wx.place).then(function(){wxBusy=false;if(tab==="today")render();})
      .catch(function(){wxBusy=false;});
    return;}
  if(!navigator.geolocation){return;}
  wxBusy=true; if(force&&tab==="today")render();
  navigator.geolocation.getCurrentPosition(function(p){
    wxFetchAt(p.coords.latitude.toFixed(3),p.coords.longitude.toFixed(3))
      .then(function(){wxBusy=false;if(tab==="today")render();})
      .catch(function(){wxBusy=false;if(tab==="today")render();});
  },function(){
    wx=Object.assign({},wx||{},{denied:true,at:Date.now()}); wxSave(); wxBusy=false;
    if(tab==="today")render();
  },{timeout:9000,maximumAge:15*60*1000,enableHighAccuracy:false});}

function openWeatherApp(){
  if(!wx||wx.t==null){wxLoad(true);return;}      // 还没数据 → 借这次点击申请定位
  try{ window.location.href="weather://"; }catch(e){}}

/* 手动指定城市（定位被拒或不准时的兜底）*/
function wxCitySheet(){
  openSheet('<h2>Weather location</h2>'+
    '<div class="note" style="margin:0 0 12px">Leave empty to use your device location.</div>'+
    '<input class="inp" id="wc" placeholder="Jersey City" autocomplete="off">'+
    '<div class="st" id="wcs"></div>'+
    '<div class="row" style="margin-top:12px"><button class="btn" id="wcgo" style="flex:1">Search</button>'+
    '<button class="btn g" id="wcx">Cancel</button></div>');
  $("wcx").onclick=closeSheet;
  $("wcgo").onclick=function(){
    var q=$("wc").value.trim(); if(!q)return;
    $("wcs").className="st";$("wcs").textContent="Searching…";
    fetch("https://geocoding-api.open-meteo.com/v1/search?count=1&name="+encodeURIComponent(q))
    .then(function(r){return r.json()})
    .then(function(j){
      var g=j&&j.results&&j.results[0]; if(!g)throw 0;
      wx=Object.assign({},wx||{},{lat:g.latitude,lon:g.longitude,place:g.name,manual:true,denied:false,at:0});
      wxSave(); return wxFetchAt(g.latitude,g.longitude,g.name);})
    .then(function(){$("wcs").className="st good";$("wcs").textContent="Set ✓";
      setTimeout(function(){closeSheet();render()},500);})
    .catch(function(){$("wcs").className="st bad";$("wcs").textContent="City not found";});};}

function setWxUnit(u){wxUnit=u;try{store.set("rec.wxunit",u)}catch(e){}render();}

function applyTheme(){
  var r=document.documentElement;
  if(theme==="system")r.removeAttribute("data-theme");
  else r.setAttribute("data-theme",theme);
  var dark = theme==="dark" || (theme==="system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  var mt=document.querySelector('meta[name="theme-color"]');
  if(mt)mt.setAttribute("content",dark?"#0E1412":"#F4F6F5");
}
function setTheme(t){theme=t;try{store.set(LS.theme,t)}catch(e){}applyTheme();}
applyTheme();
try{window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",function(){if(theme==="system")applyTheme()});}catch(e){}

var TABLES=["todos","weekly_focus","diary","habits","habit_logs","subscriptions","birthdays","ledger","countdowns"];
var D={todos:[],weekly_focus:[],diary:[],habits:[],habit_logs:[],subscriptions:[],birthdays:[],ledger:[],countdowns:[]};
var outbox=[],cfg=null,tab="today",syncing=false;
var planView="week", cursor=new Date(), diaryDate=todayStr(), ledMonth=new Date();
/* 视图历史：记住是从哪一层进来的，返回时原路回去 */
var viewStack=[];
function goView(v){ if(v!==planView)viewStack.push(planView); if(viewStack.length>12)viewStack.shift(); planView=v; }
function backView(){ planView = viewStack.pop() || "week"; }
function backLabel(){
  var to=viewStack[viewStack.length-1]||"week";
  if(to==="month")return MONE[cursor.getMonth()];
  if(to==="year") return String(cursor.getFullYear());
  if(to==="day")  return MONS[cursor.getMonth()]+" "+cursor.getDate();
  return "Week";}

try{var c=store.get(LS.cfg); if(c) cfg=JSON.parse(c);}catch(e){}
try{var o=store.get(LS.out); if(o) outbox=JSON.parse(o)||[];}catch(e){}
try{var d=store.get(LS.data); if(d){var p=JSON.parse(d); TABLES.forEach(function(t){if(Array.isArray(p[t]))D[t]=p[t];});}}catch(e){}

function saveLocal(){try{store.set(LS.data,JSON.stringify(D));}catch(e){}}
function saveOut(){try{store.set(LS.out,JSON.stringify(outbox));}catch(e){}}
var $=function(id){return document.getElementById(id)};
function uid(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}

/* ============ 日期工具 ============ */
function pad(n){return n<10?"0"+n:""+n}
function fmt(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function todayStr(){return fmt(new Date())}
function parse(s){var a=String(s).split("-");return new Date(+a[0],+a[1]-1,+a[2])}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}
function startOfWeek(d){var x=new Date(d);var w=x.getDay();x.setDate(x.getDate()-w);x.setHours(0,0,0,0);return x} // 周日起
var WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var WDE=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function weekKey(d){var s=startOfWeek(d);var t=new Date(s.getFullYear(),0,1);
  var n=Math.floor((s-t)/86400000);return s.getFullYear()+"-W"+pad(Math.ceil((n+t.getDay()+1)/7))}
function parseYMD(str){                 // 20200930 / 2020-09-30 / 2020.9.30
  var t=String(str||"").trim();
  var m=t.match(/^(\d{4})\D?(\d{1,2})\D?(\d{1,2})$/);
  if(!m)return null;
  var y=+m[1], mo=+m[2], d=+m[3];
  if(mo<1||mo>12||d<1||d>31)return null;
  if(new Date(y,mo-1,d).getDate()!==d)return null;   // 排除 2月30日 这类
  return y+"-"+pad(mo)+"-"+pad(d);}

function daysTo(ds){                    // 到某个具体日期的天数：负=已过
  var t=new Date();t.setHours(0,0,0,0);
  return Math.round((parse(ds)-t)/86400000);}

function daysUntil(md){var t=new Date();t.setHours(0,0,0,0);var y=t.getFullYear();
  var a=String(md).split("-");                 // 接受 'MM-DD' 或 'YYYY-MM-DD'
  if(a.length===3)a=[a[1],a[2]];
  var mo=+a[0]-1, dy=+a[1];
  if(isNaN(mo)||isNaN(dy))return 9999;
  var n=new Date(y,mo,dy); if(n<t)n=new Date(y+1,mo,dy);
  return Math.round((n-t)/86400000)}

/* ============ 云同步 ============ */
function api(path,opts){opts=opts||{};if(!cfg)return Promise.reject(new Error("no-config"));
  var base=String(cfg.url).trim().replace(/\/+$/,"").replace(/\/rest\/v1$/,"");
  var h=Object.assign({apikey:cfg.key,"Content-Type":"application/json"},opts.headers||{});
  if(!/^sb_/.test(cfg.key))h.Authorization="Bearer "+cfg.key;
  return fetch(base+"/rest/v1/"+path,Object.assign({},opts,{headers:h})).then(function(r){
    if(!r.ok)return r.text().catch(function(){return""}).then(function(t){throw new Error("HTTP "+r.status+" "+t)});
    return r;});}
function push(table,row){D[table]=D[table].filter(function(x){return x.id!==row.id});D[table].push(row);

/* ---- 快速捕捉：一行输入，自动分辨待办与记账 ---- */
var WKMAP={"周日":0,"周一":1,"周二":2,"周三":3,"周四":4,"周五":5,"周六":6,"周天":0,
 "sun":0,"mon":1,"tue":2,"wed":3,"thu":4,"fri":5,"sat":6};

function parseCapture(raw,today){
  var s=String(raw||"").trim(); if(!s)return null;
  today=today||new Date();
  var out={text:"",date:null,time:null,end:null,cost:null,kind:"todo"};

  // 金额：¥35 / $35 / 35元 / +35（收入）
  var m=s.match(/(?:^|\s)([¥$+])?(\d+(?:\.\d{1,2})?)(元|块)?(?=\s|$)/);
  var hasCur=false;
  if(m && (m[1]||m[3])){ hasCur=true;
    out.cost=parseFloat(m[2]); out.income=(m[1]==="+");
    s=(s.slice(0,m.index)+" "+s.slice(m.index+m[0].length)).trim(); }

  // 日期词
  function setD(d){out.date=fmt(d)}
  var dm;
  if(/今天|today/i.test(s)){setD(today); s=s.replace(/今天|today/ig,"").trim();}
  else if(/明天|tomorrow/i.test(s)){setD(addDays(today,1)); s=s.replace(/明天|tomorrow/ig,"").trim();}
  else if(/后天/.test(s)){setD(addDays(today,2)); s=s.replace(/后天/g,"").trim();}
  else if((dm=s.match(/(下)?(周[一二三四五六日天]|周末)/)) || (dm=s.match(/\b(next\s+)?(sun|mon|tue|wed|thu|fri|sat)(?:day|s?day)?\b/i))){
    var key=String(dm[2]).toLowerCase(); var target=WKMAP[key]!==undefined?WKMAP[key]:6;
    var cur=today.getDay(), diff=(target-cur+7)%7;
    if(diff===0)diff=7; if(dm[1])diff+=7;
    setD(addDays(today,diff)); s=s.replace(dm[0],"").trim();}
  else if((dm=s.match(/(\d{1,2})[\/.月](\d{1,2})日?/))){
    var y=today.getFullYear(), mo=+dm[1], da=+dm[2];
    var d=new Date(y,mo-1,da); if(d<new Date(fmt(today)))d=new Date(y+1,mo-1,da);
    setD(d); s=(s.slice(0,dm.index)+" "+s.slice(dm.index+dm[0].length)).trim();}

  // 时间区间：10-12 / 10:00-12:30 / 10点-12点
  var r=s.match(/(\d{1,2})(?::(\d{2}))?\s*[-~至]\s*(\d{1,2})(?::(\d{2}))?\s*点?/);
  if(r){ out.time=pad(+r[1])+":"+(r[2]||"00"); out.end=pad(+r[3])+":"+(r[4]||"00");
    s=(s.slice(0,r.index)+" "+s.slice(r.index+r[0].length)).trim(); }
  else {
    // 单个时间：10点 / 10:30 / 9am / 下午3点
    var pm=/下午|晚上|傍晚|pm/i.test(s);
    var t=s.match(/(?:上午|下午|晚上|早上|傍晚)?\s*(\d{1,2})(?::(\d{2}))?\s*(点|am|pm)?/i);
    if(t && (t[2]!==undefined||t[3]||/[上下]午|早上|晚上|傍晚/.test(s))){
      var hh=+t[1]; if(pm&&hh<12)hh+=12;
      out.time=pad(hh)+":"+(t[2]||"00");
      s=(s.slice(0,t.index)+" "+s.slice(t.index+t[0].length)).replace(/(上午|下午|晚上|早上|傍晚)/g,"").trim(); }
  }

  out.text=s.replace(/\s+/g," ").trim();
  if(out.cost!=null && (hasCur || !out.time)) out.kind="cost";
  if(!out.text && out.kind!=="cost")return null;
  return out;}

/* ---- 习惯热力图（近 26 周）---- */
function heatmap(habitId){
  var end=startOfWeek(new Date()), start=addDays(end,-25*7), cells="";
  var logs={};
  D.habit_logs.forEach(function(l){
    if(habitId&&l.habit_id!==habitId)return;
    logs[l.date]=(logs[l.date]||0)+1;});
  var total=habitId?1:Math.max(1,D.habits.filter(function(h){return !h.archived}).length);
  for(var w=0;w<26;w++)for(var d=0;d<7;d++){
    var day=addDays(start,w*7+d), ds=fmt(day);
    var n=logs[ds]||0, r=n/total, lv=n===0?0:r<=.34?1:r<=.67?2:r<1?3:4;
    cells+='<i class="l'+lv+'" title="'+ds+'"></i>';}
  return '<div class="heat">'+cells+'</div>'+
    '<div class="heatlg">Less <i class="l0" style="background:var(--line2)"></i><i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i> More</div>';}

/* ---- 周回顾 ---- */
function weekStats(ws){
  var we=addDays(ws,6), a=fmt(ws), b=fmt(we);
  var td=D.todos.filter(function(t){return t.due_date&&t.due_date>=a&&t.due_date<=b});
  var done=td.filter(function(t){return t.done}).length;
  var led=D.ledger.filter(function(r){return r.date>=a&&r.date<=b});
  var spend=led.filter(function(r){return r.kind==="expense"}).reduce(function(x,r){return x+(+r.amount||0)},0);
  var logs=D.habit_logs.filter(function(l){return l.date>=a&&l.date<=b}).length;
  var dia=D.diary.filter(function(d){return d.date>=a&&d.date<=b&&(d.text||"").trim()}).length;
  return {done:done,total:td.length,spend:spend,logs:logs,diary:dia,a:a,b:b};}

function vReview(){
  var ws=startOfWeek(cursor), cur=weekStats(ws), prev=weekStats(addDays(ws,-7));
  function delta(now,before,invert){
    if(!before)return "";
    var p=Math.round((now-before)/before*100); if(!p)return '<div class="rvd">even with last week</div>';
    var worse=invert?p>0:p<0;
    return '<div class="rvd '+(worse?"up":"down")+'">'+(p>0?"+":"")+p+"% vs last week</div>";}
  var rate=cur.total?Math.round(cur.done/cur.total*100):0;
  var prate=prev.total?Math.round(prev.done/prev.total*100):0;
  var h='<div class="sec" style="margin-top:8px">Week of '+MONS[ws.getMonth()]+' '+ws.getDate()+'</div>';

     '<div class="rvc"><div class="rvn">'+rate+'%</div><div class="rvl">Tasks done</div>'+
       '<div class="rvd">'+cur.done+' of '+cur.total+(prate?" · last week "+prate+"%":"")+'</div></div>'+
     '<div class="rvc"><div class="rvn">'+money(cur.spend)+'</div><div class="rvl">Spent</div>'+
       delta(cur.spend,prev.spend,true)+'</div>'+

       delta(cur.logs,prev.logs)+'</div>'+
     '<div class="rvc"><div class="rvn">'+cur.diary+'</div><div class="rvl">Diary entries</div>'+
       '<div class="rvd">'+(7-cur.diary)+' days unwritten</div></div>'+
     '</div>';
  h+='<div class="sec">Consistency · last 26 weeks</div><div class="card" style="padding:14px 15px">'+heatmap(null)+'</div>';
  var open=D.todos.filter(function(t){return !t.done&&t.due_date&&t.due_date<todayStr()});
  h+='<div class="sec">Carried over ('+open.length+')</div>';

function dropUndo(table,id,label){
  // 重复任务的某一次：只跳过这一天，不动整条规则
  if(table==="todos"&&String(id).indexOf("@")>0){
    var p=String(id).split("@"), sid=p[0], ds=p[1];
    var st=D.todos.filter(function(x){return x.id===sid})[0]; if(!st)return;
    var arr=jlist(st.skip_dates); if(arr.indexOf(ds)<0)arr.push(ds);
    push("todos",Object.assign({},st,{skip_dates:JSON.stringify(arr),updated_at:new Date().toISOString()}));
    render();
    toast("Occurrence removed",function(){
      var cur=D.todos.filter(function(x){return x.id===sid})[0]||st;
      var a2=jlist(cur.skip_dates).filter(function(x){return x!==ds});
      push("todos",Object.assign({},cur,{skip_dates:JSON.stringify(a2),updated_at:new Date().toISOString()}));
      render();});
    return;}
  var row=D[table].filter(function(x){return x.id===id})[0]; if(!row)return;
  var snap=Object.assign({},row);
  drop(table,id);
  toast((label||"Deleted"),function(){
    push(table,Object.assign({},snap,{updated_at:new Date().toISOString()}));render();});}
var lastErr="";
function flush(){if(!cfg||!outbox.length)return Promise.resolve(true);
  var op=outbox[0];
  var p=op.t==="up"?api(op.tb,{method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:JSON.stringify([op.row])})
                   :api(op.tb+"?id=eq."+encodeURIComponent(op.id),{method:"DELETE",headers:{Prefer:"return=minimal"}});
  return p.then(function(){outbox.shift();saveOut();return flush()})
   .catch(function(e){
     var m=String(e&&e.message||"");
     lastErr=m||"network error";
     // 字段在数据库里不存在 → 剔掉该字段重发，不丢这条记录
     var col=m.match(/'([\w_]+)' column/)||m.match(/column "?([\w_]+)"?/);
     if(op.t==="up"&&col&&op.row&&col[1] in op.row&&!op.__fix){
       var row2=Object.assign({},op.row); delete row2[col[1]];
       op.row=row2; op.__fix=(op.__fix||0)+1; saveOut();
       lastErr="dropped unknown field: "+col[1]+" (run the latest SQL)";
       return flush();}
     // 其它 4xx = 服务器明确拒绝，重试永远不会成功 → 丢弃这条，放行队列
     if(/HTTP 4\d\d/.test(m)){
       op.__bad=(op.__bad||0)+1;
       outbox.shift();saveOut();
       return flush();}
     return false;});}
function sync(){if(!cfg){setSync("local");return Promise.resolve(false)}
  if(syncing)return Promise.resolve(false);
  syncing=true;setSync("syncing");
  return flush().then(function(ok){if(ok===false)throw new Error(lastErr||"upload failed");
    return Promise.all(TABLES.map(function(t){
      return api(t+"?select=*").then(function(r){return r.json()})
        .catch(function(e){throw new Error(t+": "+(e&&e.message||"failed"))});}));})
  .then(function(res){TABLES.forEach(function(t,i){D[t]=res[i]||[]});saveLocal();lastErr="";setSync("ok");render();
    syncing=false;return true;})
  .catch(function(e){lastErr=String(e&&e.message||"network error");setSync("offline");
    syncing=false;return false;});}
function setSync(s){var p=$("syncPill");
  p.className="pill"+(s==="ok"?" ok":s==="syncing"?" syncing":s==="offline"?" offline":"");
  $("syncTxt").textContent=s==="ok"?"Synced":s==="syncing"?"Syncing":s==="offline"?"Offline":"Not linked";}

function addTodo(text,date,time){text=(text||"").trim();if(!text)return;
  push("todos",{id:uid(),text:text,done:false,sort:Date.now(),due_date:date||null,due_time:time||null,updated_at:new Date().toISOString()});}
function nextDue(ds,rule){
  var d=parse(ds);
  if(rule==="daily")return fmt(addDays(d,1));
  if(rule==="weekly")return fmt(addDays(d,7));
  if(rule==="weekday"){do{d=addDays(d,1)}while(d.getDay()===0||d.getDay()===6);return fmt(d);}
  if(rule==="monthly"){var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
    var last=new Date(y,m+1,0).getDate();
    return fmt(new Date(y,m,Math.min(day,last)));}
  return null;}

function toggleTodo(id){
  var now=new Date().toISOString();
  // 重复任务的某一次：只在 done_dates 里增删这一天，不影响其它次
  if(id.indexOf("@")>0){
    var p=id.split("@"), sid=p[0], ds=p[1];
    var st=D.todos.filter(function(x){return x.id===sid})[0]; if(!st)return;
    var arr=jlist(st.done_dates), i=arr.indexOf(ds);
    if(i>=0)arr.splice(i,1); else arr.push(ds);
    push("todos",Object.assign({},st,{done_dates:JSON.stringify(arr),updated_at:now}));
    render();return;}
  var t=D.todos.filter(function(x){return x.id===id})[0];if(!t)return;
  push("todos",Object.assign({},t,{done:!t.done,updated_at:now}));
  // 勾选重复任务 → 自动排下一次
  if(!t.done && t.repeat && t.due_date){
    var nd=nextDue(t.due_date,t.repeat);
    if(nd){
      var exists=D.todos.some(function(x){return x.text===t.text&&x.due_date===nd&&x.repeat===t.repeat});
      if(!exists){
        push("todos",{id:uid(),text:t.text,done:false,sort:Date.now(),due_date:nd,
          due_time:t.due_time||null,end_time:t.end_time||null,color:t.color||null,
          repeat:t.repeat,updated_at:now});
        toast("Next one scheduled · "+nd);}}}}
/* ---- 重复任务：只存一条规则，未来的实例按需展开 ---- */
function jlist(v){try{var a=JSON.parse(v||"[]");return Array.isArray(a)?a:[]}catch(e){return []}}
function hitsRule(t,ds){
  if(!t.repeat||!t.due_date||ds<=t.due_date)return false;
  var a=parse(t.due_date), b=parse(ds);
  var diff=Math.round((b-a)/86400000);
  if(t.repeat==="daily")  return diff>0;
  if(t.repeat==="weekly") return diff>0&&diff%7===0;
  if(t.repeat==="weekday")return diff>0&&b.getDay()!==0&&b.getDay()!==6;
  if(t.repeat==="monthly"){
    if(b<=a)return false;
    var last=new Date(b.getFullYear(),b.getMonth()+1,0).getDate();
    return b.getDate()===Math.min(a.getDate(),last);}
  return false;}

function todosOn(ds){
  var real=D.todos.filter(function(t){return t.due_date===ds});
  var virt=D.todos.filter(function(t){
      return t.repeat && t.due_date && t.due_date!==ds && hitsRule(t,ds)
             && jlist(t.skip_dates).indexOf(ds)<0;})
    .map(function(t){
      return Object.assign({},t,{
        id:t.id+"@"+ds, sid:t.id, vdate:ds, virtual:true,
        due_date:ds, done:jlist(t.done_dates).indexOf(ds)>=0});});
  return real.concat(virt)
    .sort(function(a,b){return (a.due_time||"99").localeCompare(b.due_time||"99")||(a.sort-b.sort)});}
function inbox(){return D.todos.filter(function(t){return !t.due_date}).sort(function(a,b){return b.sort-a.sort})}
function getFocus(k){var f=D.weekly_focus.filter(function(x){return x.id===k})[0];return f?f.text:""}

  /* ── 提醒 ── */

  if(bd)alerts.push({i:"🎂",t:bd.b.name,s:bd.d===0?"today":"in "+bd.d+" days",go:"bday"});

        .filter(function(x){return x.c.mode!=="since"&&x.d>=0&&x.d<=30})
        .sort(function(a,b){return a.d-b.d})[0];
  if(cd)alerts.push({i:"⏳",t:cd.c.name,s:cd.d===0?"today":cd.d+" days left",go:"cdown"});
  if(over.length)alerts.push({i:"⚠",t:over.length+" overdue task"+(over.length>1?"s":""),s:"tap to reschedule",go:"plan"});
  if(ib.length)alerts.push({i:"▤",t:ib.length+" in ToDo",s:"unscheduled",go:"plan"});
  if(alerts.length){

      return '<div class="kv" data-mgo="'+a.go+'" style="cursor:pointer">'+

        '<div class="kvs">'+esc(a.s)+'</div></div><span class="kvs">›</span></div>';}).join("")+'</div>';}

  return h;}

var MONE=["January","February","March","April","May","June","July","August","September","October","November","December"];
var MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function isoWeek(d){var t=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  t.setDate(t.getDate()+4-(t.getDay()||7));
  var y0=new Date(t.getFullYear(),0,1);
  return Math.ceil(((t-y0)/86400000+1)/7);}

function ciHTML(t){return '<div class="ci'+(t.done?" dn":"")+'" data-tg="'+t.id+'" data-drag="'+t.id+'">'+

/* ---- 日视图：时间轴 ---- */
var HH=60; // 每小时像素
function t2m(s){if(!s)return null;var a=String(s).split(":");return (+a[0])*60+(+a[1]||0);}
function m2t(m){return pad(Math.floor(m/60))+":"+pad(m%60);}
function layout(list){
  // 简易重叠分栏：重叠的事件并排显示
  var ev=list.filter(function(t){return t.due_time}).map(function(t){
    var s=t2m(t.due_time), e=t2m(t.end_time); if(e==null||e<=s)e=s+60;
    return {t:t,s:s,e:Math.min(e,1440)};}).sort(function(a,b){return a.s-b.s||a.e-b.e});
  var groups=[],cur=[],end=-1;
  ev.forEach(function(x){
    if(cur.length&&x.s>=end){groups.push(cur);cur=[];end=-1;}
    cur.push(x); end=Math.max(end,x.e);});
  if(cur.length)groups.push(cur);
  groups.forEach(function(g){
    var cols=[];
    g.forEach(function(x){
      var ci=0; while(cols[ci]!=null&&cols[ci]>x.s)ci++;
      cols[ci]=x.e; x.col=ci;});
    var n=cols.length; g.forEach(function(x){x.cols=n;});});
  return ev;}

function dayCol(ds){
  var list=todosOn(ds), ev=layout(list), h="";
  ev.forEach(function(x){
    var w=100/x.cols, left=x.col*w;
    h+='<div class="evb '+colorOf(x.t)+(x.t.done?" dn":"")+'" data-tg="'+x.t.id+'" data-drag="'+x.t.id+'"'+
       ' style="top:'+(x.s/60*HH)+'px;height:'+Math.max(20,(x.e-x.s)/60*HH-2)+'px;'+
       'left:calc('+left+'% + 3px);width:calc('+w+'% - 6px)">'+
       '<b style="display:flex;align-items:center;gap:6px"><span class="mk sm'+(x.t.done?" on":"")+'"></span>'+
       '<span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(x.t.text)+'</span></b>'+
       '<span>'+esc(x.t.due_time)+'–'+m2t(x.e)+
         (x.t.travel?'  ·  +'+esc(x.t.travel)+'m':"")+'</span>'+
       (x.t.location?'<span style="opacity:.75">◎ '+esc(x.t.location)+'</span>':"")+
       '</div>';});
  return h;}

function allDayChips(ds){
  return todosOn(ds).filter(function(t){return !t.due_time}).map(function(t){
    return '<span class="ev '+colorOf(t)+(t.done?" dn":"")+'" data-tg="'+t.id+'" data-drag="'+t.id+'"'+
      ' style="margin:0;display:inline-flex;align-items:center;gap:6px">'+
      '<span class="mk sm'+(t.done?" on":"")+'"></span>'+esc(t.text)+'</span>';}).join("");}

function gDay(){
  var d0=new Date(cursor), d1=addDays(d0,1), ds0=fmt(d0), ds1=fmt(d1), ts=todayStr();
  var ws=startOfWeek(d0);
  // 轨道上共 4 天：前一天 / 当前两天 / 后一天，滑动时邻日内容真实可见
  var cols=[addDays(d0,-1),d0,d1,addDays(d0,2)];

  // 顶部一周日期条
  var i0=Math.round((d0-ws)/86400000);
  var two=(i0<6);
  var bandL='calc(('+i0+' + .5) / 7 * 100% - 17px)';
  var bandW= two ? 'calc(1 / 7 * 100% + 34px)' : '34px';
  var h='<div class="dstrip">'+
    '<div class="dband" style="left:'+bandL+';width:'+bandW+'"></div>';
  for(var i=0;i<7;i++){var d=addDays(ws,i),ds=fmt(d);
    h+='<div class="dcolh'+(ds===ds0?" sel":"")+(ds===ds1?" sel2":"")+(ds===ts?" td":"")+'" data-goday="'+ds+'">'+
       '<div class="wl">'+WDE[d.getDay()].slice(0,1)+'</div><div class="dd">'+d.getDate()+'</div></div>';}
  h+='</div>';

  h+='<div class="dslide" id="dslide">';

  // 两日标题（4 格轨道）
  h+='<div class="dhead"><div></div><div class="dtrack">'+
     cols.map(function(d){var ds=fmt(d);
       return '<div class="'+(ds===ts?"cur":"")+'">'+WDE[d.getDay()]+' – '+MONS[d.getMonth()]+' '+d.getDate()+'</div>';}).join("")+
     '</div></div>';

  // 全天
  var anyAll=cols.some(function(d){return allDayChips(fmt(d))});
  if(anyAll)h+='<div class="allday"><div class="lbl">all-day</div><div class="dtrack">'+
    cols.map(function(d){var ds=fmt(d);
      return '<div class="slot" data-drop="'+ds+'">'+allDayChips(ds)+'</div>';}).join("")+
    '</div></div>';

  // 时间轴
  h+='<div class="tlscroll" id="tlscroll"><div class="tlwrap" id="tlwrap" style="height:'+(24*HH)+'px">';
  h+='<div class="hours">';
  for(var k=1;k<24;k++)h+='<i style="top:'+(k*HH)+'px">'+pad(k)+':00</i>';
  h+='</div>';
  h+='<div class="dtrack">'+cols.map(function(d){var ds=fmt(d);
      return '<div class="tlcol" data-drop="'+ds+'" data-dcol="'+ds+'">'+dayCol(ds)+
             (ds===ts?nowLine():"")+'</div>';}).join("")+'</div>';
  h+='</div></div>';
  h+='</div>';
  return h;}

function nowLine(){var n=new Date(),m=n.getHours()*60+n.getMinutes();
  return '<div class="nowline" style="top:'+(m/60*HH)+'px"></div>';}

var PAL=["c0","c1","c2","c3","c4","c5"];
function colorOf(t){
  if(t.color&&/^c[0-5]$/.test(t.color))return t.color;
  var s=t.text||"",h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;
  return PAL[Math.abs(h)%6];}
function evHTML(t){
  return '<span class="ev '+colorOf(t)+(t.done?" dn":"")+'" data-drag="'+t.id+'">'+esc(t.text)+
    (t.due_time?'<span class="evt">'+esc(t.due_time)+'</span>':"")+'</span>';}

function monthSection(y,m){
  var first=new Date(y,m,1),start=startOfWeek(first),ts=todayStr();
  var h='<div class="msec" data-ym="'+y+'-'+pad(m+1)+'">'+
    '<div class="mtitle"><span style="grid-column:'+(first.getDay()+2)+' / -1">'+MONE[m]+'</span></div>';
  var weeks=Math.ceil((first.getDay()+new Date(y,m+1,0).getDate())/7);
  for(var w=0;w<weeks;w++){
    var ws=addDays(start,w*7);
    h+='<div class="wrow"><div class="wknum" data-wk="'+fmt(ws)+'">'+isoWeek(ws)+'</div>';
    for(var i=0;i<7;i++){
      var d=addDays(start,w*7+i),ds=fmt(d);
      if(d.getMonth()!==m){h+='<div class="dcell pad"></div>';continue;}

  var box=$("mscroll"); if(!box)return;

  var tgt=box.querySelector('[data-ym="'+key+'"]');
  var tdCell=box.querySelector('.dcell.today');
  if(window.__centerToday&&tdCell){
    var row=tdCell.parentElement;
    var y=row.offsetTop+row.offsetHeight/2-window.innerHeight/2;
    window.scrollTo(0,Math.max(0,y));
  }else if(tgt)window.scrollTo(0,tgt.offsetTop-56);

  if(window.__mScroll)window.removeEventListener("scroll",window.__mScroll);
  window.__mScroll=function(){
    if(tab!=="plan"||planView!=="month")return;
    var b=$("mscroll"); if(!b)return;
    // 到底自动续接下一个月
    if(window.innerHeight+window.scrollY > b.offsetTop+b.offsetHeight-600){
      var last=b.lastElementChild.dataset.ym.split("-");
      var nd=new Date(+last[0],+last[1],1);
      b.insertAdjacentHTML("beforeend",monthSection(nd.getFullYear(),nd.getMonth()));
      bindMonthCells();}
    // 顶栏固定不动，仅当滚过跨年时更新其中的年份数字
    var secs=b.querySelectorAll(".msec"), line=window.scrollY+(parseInt(getComputedStyle(document.documentElement).getPropertyValue("--topH"))||84)+10, cur=null;
    for(var i=0;i<secs.length;i++){
      if(secs[i].offsetTop<=line)cur=secs[i]; else break;}
    if(cur){
      var a=cur.dataset.ym.split("-"), y=+a[0], m=+a[1]-1;
      if(y!==cursor.getFullYear()||m!==cursor.getMonth()){
        cursor=new Date(y,m,1);

  window.addEventListener("scroll",window.__mScroll,{passive:true});
  bindMonthCells();}

function miniMonth(y,m){

  var now=new Date(), cur=(y===now.getFullYear()&&m===now.getMonth());

  for(var d=1;d<=dim;d++){
    var ds=y+"-"+pad(m+1)+"-"+pad(d);
    var has=D.todos.some(function(t){return t.due_date===ds});
    cells+='<span class="'+(ds===ts?"td":(has?"has":""))+'">'+d+'</span>';}
  return '<div class="ymini'+(cur?" cur":"")+'" data-month="'+m+'">'+
    '<div class="mn2">'+MONS[m]+'</div><div class="mdays">'+cells+'</div></div>';}

function impSheet(){
  openSheet('<h2>Import Bills</h2>'+
    '<div class="note" style="margin:0 0 12px">Alipay: app → Me → Bills → top-right → request transaction statement (sent to your email).<br>'+

  $("fcsv").onchange=function(){
    var f=this.files&&this.files[0]; if(!f)return;
    $("fst").textContent="Reading…"; $("fst").className="st";
    var fr=new FileReader();
    fr.onload=function(){
      var buf=fr.result, txt="";
      try{txt=new TextDecoder("gbk").decode(buf);}catch(e){txt="";}
      if(!txt||txt.indexOf("\uFFFD")>-1){try{txt=new TextDecoder("utf-8").decode(buf);}catch(e){}}
      parsed=parseBill(txt);
      if(!parsed.length){$("fst").textContent="No transactions found. Use the original CSV from Alipay/WeChat.";$("fst").className="st bad";$("fgo").disabled=true;return;}
      var have={}; D.ledger.forEach(function(r){have[r.id]=1});
      var fresh=parsed.filter(function(r){return !have[r.id]});
      $("fst").textContent="Found "+parsed.length+", new "+fresh.length+".";
      $("fst").className="st good";
      $("fprev").innerHTML='<div class="card" style="margin-top:8px;max-height:190px;overflow:auto">'+
        fresh.slice(0,20).map(function(r){return '<div class="kv"><div style="min-width:0"><div class="kvn" style="font-size:13.5px">'+esc(r.note||r.category)+'</div>'+
        '<div class="kvs">'+esc(r.date)+' · '+esc(catL(r.category))+'</div></div><div class="kvp" style="font-size:13.5px">'+
        (r.kind==="income"?"+":"-")+'¥'+r.amount.toFixed(2)+'</div></div>'}).join("")+'</div>';
      parsed=fresh; $("fgo").disabled=!fresh.length;
    };

  };
  $("fgo").onclick=function(){
    $("fgo").disabled=true; $("fst").textContent="Importing…"; $("fst").className="st";
    parsed.forEach(function(r){push("ledger",r)});

  };}

function splitCSV(line){var out=[],cur="",q=false;
  for(var i=0;i<line.length;i++){var ch=line[i];
    if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(ch===","&&!q){out.push(cur);cur="";}
    else cur+=ch;}
  out.push(cur);return out.map(function(s){return s.trim().replace(/^\uFEFF/,"")});}

function parseBill(txt){
  var lines=txt.split(/\r?\n/), head=-1, cols=null;
  for(var i=0;i<lines.length&&i<60;i++){
    var c=splitCSV(lines[i]);
    var joined=c.join("|");
    if(/交易时间|交易创建时间|交易日期/.test(joined) && /金额|金额\(元\)/.test(joined)){head=i;cols=c;break;}
  }
  if(head<0)return [];
  function idx(res){for(var j=0;j<res.length;j++){for(var k=0;k<cols.length;k++){if(res[j].test(cols[k]))return k;}}return -1;}
  var iTime=idx([/交易时间/,/交易创建时间/,/交易日期/]),
      iAmt =idx([/^金额/,/金额\(元\)/,/^金额（元）/]),
      iInOut=idx([/收\/支/,/收支/]),
      iCat =idx([/交易分类/,/交易类型/]),
      iName=idx([/商品说明/,/商品名称/,/商品/,/交易对方/]),
      iPeer=idx([/交易对方/,/对方账号/]),
      iState=idx([/交易状态/,/当前状态/]);
  if(iTime<0||iAmt<0)return [];
  var out=[],seen={};
  for(var r=head+1;r<lines.length;r++){
    if(!lines[r].trim())continue;
    var c=splitCSV(lines[r]); if(c.length<3)continue;
    var t=(c[iTime]||"").trim(); var dm=t.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/); if(!dm)continue;
    var date=dm[1]+"-"+pad(+dm[2])+"-"+pad(+dm[3]);
    var raw=(c[iAmt]||"").replace(/[¥￥,\s]/g,""); var amt=parseFloat(raw); if(!amt||isNaN(amt))continue;
    var io=(iInOut>=0?c[iInOut]:"")||"";
    if(/不计收支|中性/.test(io))continue;
    var st=(iState>=0?c[iState]:"")||"";
    if(/失败|关闭|退款|已撤销|冻结/.test(st))continue;
    var kind=/收入/.test(io)?"income":"expense";
    var peer=(iPeer>=0?c[iPeer]:"")||"";
    var note=((iName>=0?c[iName]:"")||peer||"").slice(0,40);
    var cat=mapCat(((iCat>=0?c[iCat]:"")||"")+" "+peer, note, kind);
    var id="imp_"+date.replace(/-/g,"")+"_"+Math.round(Math.abs(amt)*100)+"_"+hash(note+io);
    if(seen[id])continue; seen[id]=1;
    out.push({id:id,date:date,amount:Math.abs(amt),kind:kind,category:cat,note:note||null,
      source:/微信|零钱/.test(txt.slice(0,400))?"wechat":"alipay",updated_at:new Date().toISOString()});
  }
  return out;}
function hash(s){var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return Math.abs(h).toString(36)}
function mapCat(raw,note,kind){
  var s=raw+" "+note;
  if(kind==="income")return /工资|薪|劳务/.test(s)?"工资":/报销/.test(s)?"报销":/红包|转账/.test(s)?"红包":/利息|收益|基金|股票/.test(s)?"理财":"其他";
  if(/餐饮|美食|外卖|饿了么|美团|咖啡|拿铁|奶茶|星巴克|瑞幸|食品|餐厅|饭|面|烧烤|火锅|便利店|罗森|全家/.test(s))return "餐饮";
  if(/交通|打车|滴滴|地铁|公交|乘车|加油|高铁|火车|12306|机票|航空|停车|单车|哈啰/.test(s))return "交通";
  if(/购物|超市|服饰|淘宝|天猫|京东|拼多多|数码|日用|百货|苹果|Apple/i.test(s))return "购物";
  if(/住房|房租|水电|物业|燃气|电费|宽带|话费|移动|联通|电信/.test(s))return "居住";
  if(/娱乐|电影|游戏|视频|音乐|会员|订阅|健身|旅游|酒店/.test(s))return "娱乐";
  if(/医疗|药|医院|挂号|体检|诊所/.test(s))return "医疗";
  if(/教育|学习|书|课程|培训|文具/.test(s))return "学习";
  if(/红包|转账|人情|礼/.test(s))return "人情";
  return "其他";}

function vCountdown(){
  var all=D.countdowns.map(function(c){return{c:c,d:daysTo(c.date)}});
  var ups   = all.filter(function(x){return x.c.mode!=="since" && x.d>=0}).sort(function(a,b){return a.d-b.d});
  var sinces= all.filter(function(x){return x.c.mode==="since"}).sort(function(a,b){return a.d-b.d});
  var past  = all.filter(function(x){return x.c.mode!=="since" && x.d<0}).sort(function(a,b){return b.d-a.d});

  var h='<button class="btn" id="addCd" style="width:100%;margin-bottom:12px">+ New countdown</button>';
  if(!all.length)return h+'<div class="card"><div class="empty"><span class="e">⏳</span>No countdowns</div></div>';

  // 头图：优先展示最近的倒数；没有则展示最久的正数
  var hero=ups[0]||sinces[0];
  if(hero){
    var isS=(hero.c.mode==="since"), n=hero.d;
    var big = isS ? (n>0?n:Math.abs(n)+1) : Math.abs(n);
    var unit= isS ? (n>0?"days to start":"days in") : (n===0?"today":n===1?"day left":"days left");
    h+='<div class="hero" style="margin-bottom:14px"><div class="hl">'+
       '<div class="hgreet">'+(isS?"Counting up":"Next up")+'</div>'+
       '<div class="hdate" style="font-size:22px">'+esc(hero.c.name)+'</div>'+
       '<div class="hsub">'+esc(hero.c.date)+(hero.c.note?' · '+esc(hero.c.note):"")+'</div></div>'+
       '<div style="text-align:right;flex:none"><div style="font-size:34px;font-weight:800;letter-spacing:-.04em;'+
       'font-variant-numeric:tabular-nums;line-height:1">'+big+'</div>'+
       '<div class="rvl" style="margin-top:2px">'+unit+'</div></div></div>';}

  if(ups.length)   h+='<div class="sec">Counting down</div><div class="card">'+ups.map(cdRow).join("")+'</div>';
  if(sinces.length)h+='<div class="sec">Counting up</div><div class="card">'+sinces.map(cdRow).join("")+'</div>';
  if(past.length)  h+='<div class="sec">Passed</div><div class="card">'+past.map(cdRow).join("")+'</div>';
  return h;}
