/* ============ 事件绑定 ============ */
/* ---- 拖拽：把待办拖到其他格子改期（长按 250ms 启动，兼容 iOS 触摸） ---- */
var dragState=null, dragBlockClick=0;
/* ---- 惯性滚动：松手后按摩擦力自然减速 ---- */
var momo=null;
function stopMomentum(){ if(momo){cancelAnimationFrame(momo.raf);momo=null;} }
function startMomentum(el,v){
  stopMomentum();
  if(!el||Math.abs(v)<0.06)return;                 // 太慢就不用滑了
  var vel=Math.max(-2.6,Math.min(2.6,v))*16;       // px/帧，限幅避免飞出去
  var st={raf:0};
  momo=st;
  (function step(){
    if(momo!==st)return;
    el.scrollTop -= vel;
    vel *= 0.94;                                    // 摩擦系数：越接近 1 滑得越远
    var top=el.scrollTop<=0, bot=el.scrollTop>=el.scrollHeight-el.clientHeight-1;
    if(Math.abs(vel)<0.25||((top&&vel>0)||(bot&&vel<0))){momo=null;return;}
    st.raf=requestAnimationFrame(step);
  })();}

function bindDrag(){
  document.querySelectorAll("[data-drag]").forEach(function(el){
    if(el.__dg)return; el.__dg=1;
    el.addEventListener("pointerdown",function(ev){
      if(ev.button&&ev.button!==0)return;
      var id=el.dataset.drag, sx=ev.clientX, sy=ev.clientY, started=false, timer;
      var isMouse=(ev.pointerType==="mouse"||ev.pointerType===undefined);
      // 竖向滑动时手动驱动所在容器滚动（因为拖拽期间原生滚动被锁）
      var scroller=el.closest(".citems,.qslist,.tlscroll,.mwrap,.dbody")||null;
      var panning=false, lastY=ev.clientY, lastT=Date.now(), vel=0;
      stopMomentum();                               // 手指落下 → 立刻刹车
      function lockScroll(on){
        if(on){ document.addEventListener("touchmove",blockTM,{passive:false});
                document.body.style.overflow="hidden"; }
        else  { document.removeEventListener("touchmove",blockTM,{passive:false});
                document.body.style.overflow=""; }}
      function blockTM(ev2){ ev2.preventDefault(); }

      function begin(x,y){
        if(started)return;
        started=true;
        lockScroll(true);
        try{ var sel=window.getSelection(); if(sel&&sel.removeAllRanges)sel.removeAllRanges(); }catch(e){}
        var t=D.todos.filter(function(x2){return x2.id===id})[0]; if(!t)return;
        var g=document.createElement("div"); g.className="ghost"; g.textContent=t.text;
        document.body.appendChild(g);
        $("dz").classList.add("on");
        dragState={id:id,ghost:g,cell:null};
        el.classList.add("dragging");
        moveGhost(x||sx,y||sy);}
      // 手指：长按 250ms 启动；鼠标：拖动即启动（单击仍是勾选）
      if(!isMouse){
        lockScroll(true);                       // 按下即锁，避免长按判定期被滚动抢走
        timer=setTimeout(function(){begin(sx,sy)},250);}
      function moveGhost(x,y){
        if(!dragState)return;
        dragState.ghost.style.transform="translate("+(x-40)+"px,"+(y-22)+"px) scale(1.04)";
        var under=document.elementFromPoint(x,y);
        var cell=under&&under.closest?under.closest("[data-drop]"):null;
        if(dragState.cell!==cell){
          if(dragState.cell)dragState.cell.classList.remove("over");
          if(cell&&cell.id!=="dz")cell.classList.add("over");
          dragState.cell=cell;}
        $("dz").classList.toggle("hot", !!(cell&&cell.id==="dz"));
        // 靠近上下边缘时自动滚动，方便拖到屏幕外的日期
        var h=window.innerHeight, edge=90;
        dragState.vy = y<edge ? -12 : (y>h-edge ? 12 : 0);
        if(dragState.vy&&!dragState.timer){
          dragState.timer=setInterval(function(){
            if(!dragState||!dragState.vy){return}
            window.scrollBy(0,dragState.vy);},16);}
        if(!dragState.vy&&dragState.timer){clearInterval(dragState.timer);dragState.timer=null;}
      }
      function mv(e){
        if(panning){                                  // 已进入滚动模式：自己驱动容器
          var now=Date.now(), dt=Math.max(1,now-lastT), dyy=e.clientY-lastY;
          if(scroller)scroller.scrollTop -= dyy;
          vel = vel*0.7 + (dyy/dt)*0.3;             // 平滑后的瞬时速度
          lastY=e.clientY; lastT=now; return;}
        if(!started){
          var dx=Math.abs(e.clientX-sx), dy=Math.abs(e.clientY-sy);
          if(isMouse){ if(dx>4||dy>4)begin(e.clientX,e.clientY); else return; }
          else {
            if(dy>9&&dy>dx&&scroller){                // 竖向为主 → 转为滚动
              clearTimeout(timer); panning=true; lastY=e.clientY;
              scroller.scrollTop -= (e.clientY-sy);
              return;}
            if(dx>9||dy>9){clearTimeout(timer);cleanup();}
            return;}}
        e.preventDefault();
        moveGhost(e.clientX,e.clientY);}
      function up(e){
        clearTimeout(timer);
        if(started&&dragState){
          if(dragState.timer)clearInterval(dragState.timer);
          var cell=dragState.cell;
          if(cell&&cell.id==="dz"){
            dropUndo("todos",dragState.id,"Task deleted");
          }else if(cell&&String(dragState.id).indexOf("@")>0){
            // 重复任务的某一次被拖走：原处跳过，新日期生成独立的一条
            var pp=String(dragState.id).split("@"), sid2=pp[0], ods=pp[1];
            var st2=D.todos.filter(function(x){return x.id===sid2})[0];
            var nds=cell.dataset.drop||null;
            if(st2&&nds&&nds!==ods){
              var sk=jlist(st2.skip_dates); if(sk.indexOf(ods)<0)sk.push(ods);
              push("todos",Object.assign({},st2,{skip_dates:JSON.stringify(sk),updated_at:new Date().toISOString()}));
              push("todos",{id:uid(),text:st2.text,done:false,sort:Date.now(),due_date:nds,
                due_time:st2.due_time||null,end_time:st2.end_time||null,color:st2.color||null,
                repeat:null,updated_at:new Date().toISOString()});
              toast("Moved this one only");}
            cell.classList.remove("over");
          }else if(cell){
            var t=D.todos.filter(function(x){return x.id===dragState.id})[0];
            var nd=cell.dataset.drop||null;
            if(t&&(t.due_date||null)!==nd){
              push("todos",Object.assign({},t,{due_date:nd,updated_at:new Date().toISOString()}));}
            cell.classList.remove("over");}
          $("dz").classList.remove("on","hot");
          dragState.ghost.remove();
          el.classList.remove("dragging");
          dragState=null; dragBlockClick=Date.now();
          render();}
        cleanup();}
      function cleanup(){
        if(panning&&scroller&&Date.now()-lastT<90)startMomentum(scroller,vel);
        panning=false;
        lockScroll(false);
        var z=$("dz"); if(z)z.classList.remove("on","hot");
        if(dragState){if(dragState.timer)clearInterval(dragState.timer);
          if(dragState.ghost)dragState.ghost.remove();
          if(dragState.cell)dragState.cell.classList.remove("over");
          dragState=null;}
        el.classList.remove("dragging");
        document.removeEventListener("pointermove",mv);
        document.removeEventListener("pointerup",up);
        document.removeEventListener("pointercancel",up);}
      document.addEventListener("pointermove",mv,{passive:false});
      document.addEventListener("pointerup",up);
      document.addEventListener("pointercancel",up);
    });});}

/* ---- 日视图：长按拖出一段时间来新建日程（仿 Apple 日历）---- */
function bindTimeDraw(){
  document.querySelectorAll("[data-dcol]").forEach(function(col){
    if(col.__td)return; col.__td=1;
    col.addEventListener("pointerdown",function(ev){
      if(ev.button&&ev.button!==0)return;
      if(ev.target.closest("[data-drag]"))return;          // 按在已有日程上 → 交给拖拽
      var sc=$("tlscroll"), ds=col.dataset.dcol;
      var rect=col.getBoundingClientRect();
      var y0=ev.clientY-rect.top, started=false, prev=null, timer;
      var isMouse=(ev.pointerType==="mouse"||ev.pointerType===undefined);
      var snap=function(px){var m=Math.round(px/HH*60/15)*15; return Math.max(0,Math.min(1425,m));};
      var a=snap(y0), b=a+60;

      function begin(){
        if(started)return;
        started=true;
        if(sc)sc.style.touchAction="none";
        prev=document.createElement("div");
        prev.className="evb prev";
        col.appendChild(prev);
        draw();}

      // 手指：长按 260ms 启动（避免与滚动冲突）；鼠标：拖动即启动
      if(!isMouse)timer=setTimeout(begin,260);

      function draw(){
        var s1=Math.min(a,b), e1=Math.max(a,b);
        if(e1-s1<15)e1=s1+15;
        prev.style.top=(s1/60*HH)+"px";
        prev.style.height=Math.max(18,(e1-s1)/60*HH-2)+"px";
        prev.style.left="3px"; prev.style.right="3px";
        prev.innerHTML='<b>New</b><span>'+m2t(s1)+'–'+m2t(e1)+'</span>';}

      function mv(e){
        if(!started){
          var dy=Math.abs(e.clientY-ev.clientY), dx=Math.abs(e.clientX-ev.clientX);
          if(isMouse){ if(dy>4&&dy>=dx)begin(); else return; }
          else { if(dy>10||dx>10){clearTimeout(timer);cleanup();} return; }}
        e.preventDefault();
        b=snap(e.clientY-col.getBoundingClientRect().top);
        draw();}

      function up(){
        clearTimeout(timer);
        if(started){
          var s1=Math.min(a,b), e1=Math.min(1440,Math.max(a,b));
          if(e1-s1<15)e1=Math.min(1440,s1+15);
          cleanup();
          newTodoSheet(ds,m2t(s1),m2t(e1));
          setTimeout(function(){var n=$("nt"); if(n)n.focus();},120);
        }else cleanup();}

      function cleanup(){
        started=false;
        if(prev&&prev.parentNode)prev.parentNode.removeChild(prev);
        prev=null;
        if(sc)sc.style.touchAction="";
        document.removeEventListener("pointermove",mv);
        document.removeEventListener("pointerup",up);
        document.removeEventListener("pointercancel",up);}

      document.addEventListener("pointermove",mv,{passive:false});
      document.addEventListener("pointerup",up);
      document.addEventListener("pointercancel",up);
    });});}

function initDayView(){
  var sc=$("tlscroll"); if(!sc)return;
  bindTimeDraw();
  // 初始滚动到当前时间（或 7:00）
  var n=new Date(), m=(fmt(cursor)===todayStr())?n.getHours()*60+n.getMinutes():8*60;
  sc.scrollTop=Math.max(0,m/60*HH-sc.clientHeight/3);
  // 左右滑动换日：轨道跟手位移，松手吸附一格（邻日内容真实可见）
  var sl=$("dslide"); if(!sl||sl.__sw)return; sl.__sw=1;
  var sx=0,sy=0,st=0,down=false,slide=false,colW=0;

  function setX(px,anim){
    sl.classList.toggle("snap",!!anim);
    sl.style.setProperty("--sx",(px||0)+"px");}

  sl.addEventListener("pointerdown",function(e){
    if(e.target.closest("[data-drag]"))return;
    sx=e.clientX;sy=e.clientY;st=Date.now();down=true;slide=false;
    var w=$("tlwrap"); colW=w?(w.clientWidth-46)/2:window.innerWidth/2;
    sl.classList.remove("snap");},{passive:true});

  sl.addEventListener("pointermove",function(e){
    if(!down)return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!slide){
      if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)){down=false;return;}
      if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy)){
        slide=true; sc.style.overflowY="hidden";
        var gp=document.querySelector(".evb.prev"); if(gp&&gp.parentNode)gp.parentNode.removeChild(gp);}
      else return;}
    e.preventDefault();
    // 边缘阻尼：最多拖出一格
    var lim=colW*1.1, v=Math.max(-lim,Math.min(lim,dx));
    setX(v,false);},{passive:false});

  function finish(e){
    if(!down)return; down=false;
    if(!slide){return;}
    sc.style.overflowY="";
    var dx=((e&&e.clientX)||sx)-sx, dt=Date.now()-st;
    var far=Math.abs(dx)>colW*0.35, fast=(dt<320&&Math.abs(dx)>40);
    slide=false;
    if(far||fast){
      var dir=dx<0?1:-1;
      setX(dir<0?colW:-colW,true);          // 顺势滑满一格
      setTimeout(function(){
        cursor=addDays(cursor,dir);
        sl.classList.remove("snap");
        sl.style.setProperty("--sx","0px");
        render();
      },260);
    }else setX(0,true);}

  sl.addEventListener("pointerup",finish,{passive:true});
  sl.addEventListener("pointercancel",function(){
    if(slide){sc.style.overflowY="";setX(0,true);slide=false;} down=false;},{passive:true});}

/* ---- 生日：姓名 + 空格 + YYYYMMDD ---- */
function parseBd(str){
  var mt=String(str||"").trim().match(/^(.+?)\s+(\d{4}\D?\d{1,2}\D?\d{1,2})$/);
  if(!mt)return null;
  var d=parseYMD(mt[2]); if(!d)return null;
  return {name:mt[1].trim(), date:d};}

function bdSheet(){

  var q=$("bq");

    push("birthdays",{id:uid(),name:r.name,date:r.date,note:null,updated_at:new Date().toISOString()});
    closeSheet();render();}
  q.oninput=function(){q.style.borderColor=""};
  q.onkeydown=function(e){if(e.key==="Enter")save()};
  $("bx").onclick=closeSheet;
  $("bv").onclick=save;}

/* ---- ICS 导出 ---- */
function icsDate(ds){return ds.replace(/-/g,"")}
function exportICS(){
  var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Record//EN","CALSCALE:GREGORIAN"];
  D.todos.filter(function(t){return t.due_date}).forEach(function(t){
    L.push("BEGIN:VEVENT","UID:todo-"+t.id+"@rec","DTSTAMP:"+icsDate(todayStr())+"T000000Z");
    if(t.due_time){var hm=t.due_time.replace(":","");
      L.push("DTSTART:"+icsDate(t.due_date)+"T"+hm+"00","DURATION:PT1H");}
    else L.push("DTSTART;VALUE=DATE:"+icsDate(t.due_date));
    L.push("SUMMARY:"+(t.done?"✓ ":"")+t.text.replace(/\n/g," "),"END:VEVENT");});
  D.birthdays.forEach(function(b){
    L.push("BEGIN:VEVENT","UID:bd-"+b.id+"@rec","DTSTAMP:"+icsDate(todayStr())+"T000000Z",
      "DTSTART;VALUE=DATE:"+icsDate(b.date),"RRULE:FREQ=YEARLY","SUMMARY:🎂 "+b.name+"\u0027s Birthday","END:VEVENT");});
  L.push("END:VCALENDAR");
  var blob=new Blob([L.join("\r\n")],{type:"text/calendar"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="record.ics";a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href)},2000);}

/* ============ 启动 ============ */
function syncTopH(){
  var t=document.querySelector(".top"); if(!t)return;
  document.documentElement.style.setProperty("--topH",t.offsetHeight+"px");}
window.addEventListener("resize",syncTopH);
window.addEventListener("scroll",function(){
  var t=document.querySelector(".top");
  if(t)t.classList.toggle("stuck",window.scrollY>4);},{passive:true});

/* ---- 移动端：从事件层面拦截文字选择（CSS 之外的第二道防线）---- */
function inEditable(el){
  return !!(el&&el.closest&&el.closest('input,textarea,[contenteditable="true"]'));}
/* 禁用双指捏合缩放（iOS Safari 忽略 user-scalable，需手动拦截）*/
["gesturestart","gesturechange","gestureend"].forEach(function(ev){
  document.addEventListener(ev,function(e){e.preventDefault();},{passive:false});});

/* 禁用双击放大：300ms 内的第二次点击直接拦掉 */
var lastTap=0;
document.addEventListener("touchend",function(e){
  var now=Date.now();
  if(now-lastTap<300 && !inEditable(e.target))e.preventDefault();
  lastTap=now;},{passive:false});

// 兜底：任何触摸结束后，若无拖拽进行中则确保滚动可用
document.addEventListener("touchend",function(){
  if(!dragState){document.body.style.overflow="";}},{passive:true});
document.addEventListener("selectstart",function(e){
  if(!inEditable(e.target))e.preventDefault();},{capture:true});
document.addEventListener("contextmenu",function(e){
  if(!inEditable(e.target))e.preventDefault();});

/* ---- 抽屉交互：按钮 / 遮罩 / 左缘右滑 ---- */
$("menuBtn").onclick=openDrawer;
$("scrim").onclick=closeDrawer;
(function(){
  var sx=0,sy=0,edge=false;
  document.addEventListener("touchstart",function(e){
    if(e.touches.length!==1)return;
    var t=e.touches[0]; sx=t.clientX; sy=t.clientY;
    edge = sx<26 && !$("drawer").classList.contains("on");},{passive:true});
  document.addEventListener("touchend",function(e){
    var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(edge&&dx>55&&Math.abs(dx)>Math.abs(dy)*1.5)openDrawer();
    // 抽屉打开时左滑关闭
    if($("drawer").classList.contains("on")&&dx<-55&&Math.abs(dx)>Math.abs(dy)*1.5)closeDrawer();
    edge=false;},{passive:true});
})();

/* ---- Quick Schedule：左选日期，右点 + 直接排入 ---- */
var qsTab="undated", qsDate=null, qsWeek=null;

function qsCount(ds){return D.todos.filter(function(t){return t.due_date===ds&&!t.done}).length;}

function qsRail(){
  var ws=qsWeek||startOfWeek(new Date()), ts=todayStr(), h="";
  h+='<div class="qsnav"><button data-qw="-1">▲</button></div>';
  for(var i=0;i<7;i++){
    var d=addDays(ws,i), ds=fmt(d), n=qsCount(ds);
    h+='<div class="qsd'+(ds===qsDate?" on":"")+(ds===ts?" td":"")+'" data-qd="'+ds+'">'+
       '<span class="l">'+WDE[d.getDay()]+'<br>'+d.getDate()+'</span>'+
       '<span class="c">'+n+'</span></div>';}
  h+='<div class="qsnav"><button data-qw="1">▼</button></div>';
  return h;}

function qsRows(){
  var ts=todayStr(), list;
  var addBox = (qsTab==="undated")
    ? '<div class="qsadd"><input id="qsIn" placeholder="Add a task…" maxlength="200" '+
      'autocomplete="off" enterkeyhint="done"><button id="qsGo" disabled>+</button></div>' : "";
  if(qsTab==="undated")
    list=D.todos.filter(function(t){return !t.due_date&&!t.done});
  else
    list=D.todos.filter(function(t){return t.due_date&&t.due_date<ts&&!t.done})
                .sort(function(a,b){return a.due_date<b.due_date?-1:1});
  if(!list.length)
    return addBox+'<div class="empty">'+(qsTab==="undated"?"No unscheduled tasks":"Nothing overdue")+'</div>';
  var d=parse(qsDate), lbl=WDE[d.getDay()]+" "+MONS[d.getMonth()]+" "+d.getDate();
  return addBox+'<div class="qsg">'+list.length+' items → tap + to schedule for '+esc(lbl)+'</div>'+
    list.map(function(t){
      return '<div class="qsr"><div class="t">'+esc(t.text)+
        (qsTab==="overdue"?'<small>was '+esc(t.due_date)+'</small>':"")+'</div>'+
        '<button class="a" data-qa="'+t.id+'">+</button></div>';}).join("");}

function qsPaint(){
  $("qsRail").innerHTML=qsRail();
  $("qsList").innerHTML=qsRows();
  $("qsRail").querySelectorAll("[data-qd]").forEach(function(el){
    el.onclick=function(){qsDate=el.dataset.qd;qsPaint();};});
  $("qsRail").querySelectorAll("[data-qw]").forEach(function(el){
    el.onclick=function(){qsWeek=addDays(qsWeek||startOfWeek(new Date()),7*(+el.dataset.qw));qsPaint();};});
  var qi=$("qsIn"), qg=$("qsGo");
  if(qi&&qg){
    qi.oninput=function(){qg.disabled=!qi.value.trim()};
    var add=function(){
      var v=qi.value.trim(); if(!v)return;
      push("todos",{id:uid(),text:v,done:false,sort:Date.now(),due_date:null,
        due_time:null,end_time:null,color:null,updated_at:new Date().toISOString()});
      qi.value=""; qg.disabled=true;
      qsPaint();                                   // 刷新列表
      var n=$("qsIn"); if(n)n.focus();             // 保持焦点，连续添加
    };
    qg.onclick=add;
    qi.onkeydown=function(e){if(e.key==="Enter")add()};}
  $("qsList").querySelectorAll("[data-qa]").forEach(function(el){
    el.onclick=function(){
      var t=D.todos.filter(function(x){return x.id===el.dataset.qa})[0]; if(!t)return;
      push("todos",Object.assign({},t,{due_date:qsDate,updated_at:new Date().toISOString()}));
      var d=parse(qsDate);
      toast("Scheduled · "+MONS[d.getMonth()]+" "+d.getDate());
      qsPaint();};});}

function qsOpen(){
  if(!qsDate)qsDate=fmt(planView==="week"||planView==="month"?new Date():cursor);
  qsWeek=startOfWeek(parse(qsDate));
  $("qswrap").classList.add("on");
  qsPaint();}
function qsClose(){$("qswrap").classList.remove("on");render();}

function paintIcons(){
  document.querySelectorAll("[data-ti]").forEach(function(el){
    if(el.__ic)return; el.__ic=1;
    el.innerHTML=ico(el.dataset.ti, el.closest("#tabs")?19:17);
    el.style.display="grid"; el.style.placeItems="center";});}

function setTab(){document.querySelectorAll("#tabs button").forEach(function(b){b.classList.toggle("on",b.dataset.t===tab)})}
document.querySelectorAll("#tabs button").forEach(function(b){b.onclick=function(){tab=b.dataset.t;setTab();render()}});

document.addEventListener("visibilitychange",function(){if(!document.hidden)sync()});
setInterval(function(){if(!document.hidden)sync()},30000);
render();
if(cfg)sync();else setSync("local");
})();
